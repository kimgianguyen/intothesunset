<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD27A"/>
      <stop offset="55%" stop-color="#E09500"/>
      <stop offset="100%" stop-color="#F07048"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#E09500" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#E09500" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="h">
      <rect x="0" y="0" width="32" height="19"/>
    </clipPath>
  </defs>
  <!-- Night background -->
  <rect width="32" height="32" rx="5" fill="#0A0814"/>
  <!-- Stars -->
  <circle cx="5"  cy="7"  r="0.9" fill="#FDF6EC" opacity="0.7"/>
  <circle cx="25" cy="5"  r="0.7" fill="#FDF6EC" opacity="0.6"/>
  <circle cx="14" cy="10" r="0.6" fill="#FDF6EC" opacity="0.5"/>
  <circle cx="28" cy="12" r="0.7" fill="#FDF6EC" opacity="0.55"/>
  <circle cx="8"  cy="13" r="0.5" fill="#FDF6EC" opacity="0.4"/>
  <!-- Horizon glow -->
  <ellipse cx="16" cy="19" rx="15" ry="6" fill="url(#glow)"/>
  <!-- Sun clipped above horizon -->
  <circle cx="16" cy="19" r="9" fill="url(#sun)" clip-path="url(#h)"/>
  <!-- Horizon line -->
  <rect x="0" y="18.5" width="32" height="1" fill="rgba(253,246,236,0.22)"/>
</svg>
