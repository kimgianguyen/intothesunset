<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1200">
<title>og-image — Into The Sunset</title>
<!-- Bowlby One + Inter — exactly what the home page loads -->
<link href="https://fonts.googleapis.com/css2?family=Bowlby+One&family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* Vapor palette — exact values from home page TWEAK_DEFAULTS */
  :root {
    --night:      #1A0B2E;
    --dusk:       #2D1F4F;
    --gold:       #FFD93D;
    --coral:      #FF6B9D;
    --magenta:    #C44CFF;
    --cream:      #FFF5F8;
    --cream-soft: rgba(255,245,248,0.9);
    --cream-mute: rgba(255,245,248,0.55);
  }

  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: var(--night);
    -webkit-font-smoothing: antialiased;
  }

  .label {
    font-family: "Inter", system-ui, sans-serif;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    font-size: 11px;
  }
</style>
</head>
<body>

<div style="position:relative; width:1200px; height:630px; overflow:hidden; background:var(--night);">

  <!-- Background radial gradient (hardcoded in Hero component) -->
  <div style="position:absolute;inset:0;
    background:radial-gradient(ellipse 90% 60% at 60% 78%,
      rgba(240,112,72,0.35),
      rgba(45,27,107,0.4) 32%,
      rgba(10,8,20,1) 70%);"></div>

  <!-- Stars -->
  <div id="stars" style="position:absolute;inset:0;z-index:1;"></div>

  <!-- Sun halo (large diffuse glow) -->
  <div style="
    position:absolute; left:744px; bottom:-12.6px;
    transform:translate(-50%,0);
    width:1100px; height:1100px; border-radius:50%;
    background:radial-gradient(circle,rgba(240,112,72,.32),rgba(224,149,0,.18) 30%,transparent 55%);
    filter:blur(14px); z-index:2;"></div>

  <!-- Sun disc — uses var(--gold) = #FFD93D in vapor palette -->
  <div style="
    position:absolute; left:744px; bottom:-138.6px;
    transform:translate(-50%,0);
    width:720px; height:720px; border-radius:50%;
    background:radial-gradient(circle at 42% 38%,#FFE0A6,#F5B43A 35%,#FFD93D 60%,#2D1B6B 100%);
    box-shadow:0 0 120px rgba(224,149,0,.5),0 0 240px rgba(240,112,72,.35);
    z-index:2;"></div>

  <!-- Warm sky-to-ground atmosphere (bottom 45%) — blue-tinted base -->
  <div style="position:absolute;left:0;right:0;bottom:0;height:284px;z-index:3;pointer-events:none;
    background:linear-gradient(to top,
      rgba(6,10,52,0.94) 0%,
      rgba(80,25,8,0.40) 22%,
      rgba(180,70,20,0.16) 45%,
      transparent 100%);"></div>

  <!-- Horizon glow bloom — elliptical warm burst along the line -->
  <div style="position:absolute;left:0;right:0;top:460px;height:120px;z-index:4;pointer-events:none;
    background:radial-gradient(ellipse 70% 100% at 50% 0%,
      rgba(255,190,70,0.32),
      rgba(255,107,157,0.10) 55%,
      transparent 100%);"></div>

  <!-- The horizon line itself -->
  <div style="position:absolute;left:0;right:0;top:520px;height:1.5px;z-index:5;pointer-events:none;
    background:linear-gradient(90deg,
      transparent 0%,
      rgba(255,210,80,0.4) 8%,
      rgba(255,220,100,0.9) 28%,
      #FFD93D 50%,
      rgba(255,220,100,0.9) 72%,
      rgba(255,210,80,0.4) 92%,
      transparent 100%);"></div>

  <!-- Ocean below horizon — warm at the surface, deep indigo-blue below -->
  <div style="position:absolute;left:0;right:0;top:521px;bottom:0;z-index:4;pointer-events:none;
    background:linear-gradient(to bottom,
      rgba(50,18,6,0.55) 0%,
      rgba(10,22,90,0.80) 38%,
      rgba(5,12,68,0.97) 100%);"></div>

  <!-- Sun shimmer reflection on water — path of light from horizon down -->
  <div style="position:absolute;top:521px;bottom:0;z-index:5;pointer-events:none;
    left:604px;width:280px;
    background:linear-gradient(to bottom,
      rgba(255,215,80,0.38) 0%,
      rgba(255,170,110,0.14) 42%,
      transparent 100%);
    filter:blur(9px);border-radius:0 0 50% 50%;"></div>

  <!-- ── Nav ───────────────────────────────────────── -->
  <nav style="position:absolute;top:0;left:0;right:0;z-index:10;height:64px;
    display:flex;align-items:center;padding:0 32px;justify-content:space-between;">
    <div style="display:flex;align-items:center;gap:10px;">
      <div style="width:14px;height:14px;border-radius:50%;flex-shrink:0;
        background:radial-gradient(circle at 35% 35%,#FFD27A,#FFD93D 60%,#8a4a00 100%);
        box-shadow:0 0 14px rgba(224,149,0,0.7);"></div>
      <span class="label" style="color:var(--cream-soft);letter-spacing:0.28em;">Into The Sunset</span>
    </div>
    <div style="display:flex;align-items:center;gap:24px;">
      <span class="label" style="color:var(--cream-mute);">Programme</span>
      <span class="label" style="color:var(--cream-mute);">Tickets</span>
      <span class="label" style="color:var(--cream-mute);">The Field</span>
      <span class="label" style="color:var(--cream-mute);">FAQ</span>
      <div style="background:var(--magenta);color:var(--cream);
        padding:10px 18px;border-radius:999px;
        font-family:'Inter',system-ui,sans-serif;font-size:12px;font-weight:600;
        letter-spacing:0.14em;text-transform:uppercase;">Get Tickets</div>
    </div>
  </nav>

  <!-- ── Hero content ──────────────────────────────── -->
  <div style="position:relative;z-index:5;padding:88px 64px 0;max-width:800px;">

    <div class="label" style="color:var(--gold);margin-bottom:18px;">
      EUS × MomentsThatLive Present
    </div>

    <!-- Title: Bowlby One, 168px, uppercase, line-height 0.88 -->
    <!-- "SUNSET" is italic + coral (#FF6B9D) per italicSunset=true -->
    <h1 style="
      font-family: 'Bowlby One', Georgia, serif;
      font-weight: 400;
      font-size: 100px;
      line-height: 0.88;
      text-transform: uppercase;
      letter-spacing: -0.005em;
      color: var(--cream);
      text-shadow: 0 4px 40px rgba(0,0,0,0.5);
      margin: 0;">
      Into The<br>
      <span style="font-style:italic;color:var(--coral);text-shadow:0 0 60px rgba(255,107,157,0.45);">Sunset</span>
    </h1>

    <!-- Detail row -->
    <div style="margin-top:30px;display:flex;gap:44px;align-items:flex-start;">
      <div>
        <div class="label" style="color:var(--cream-mute);margin-bottom:5px;">Date</div>
        <div style="font-family:'Inter',system-ui,sans-serif;font-size:15px;font-weight:500;color:var(--cream);">Sept 11 &amp; 12, 2026</div>
      </div>
      <div>
        <div class="label" style="color:var(--cream-mute);margin-bottom:5px;">Field</div>
        <div style="font-family:'Inter',system-ui,sans-serif;font-size:15px;font-weight:500;color:var(--cream);">McGill Lower · Montréal</div>
      </div>
    </div>

  </div>


</div>

<script>
// Deterministic star field — same 110 stars every time
(function(){
  var c = document.getElementById('stars');
  var f = document.createDocumentFragment();
  var s = 42;
  function rng(){ s=(s*1664525+1013904223)&0xffffffff; return (s>>>0)/0xffffffff; }
  for(var i=0;i<110;i++){
    var el=document.createElement('div');
    var sz=rng()*1.6+0.4;
    el.style.cssText='position:absolute;border-radius:50%;'
      +'left:'+(rng()*100).toFixed(2)+'%;'
      +'top:'+(rng()*55).toFixed(2)+'%;'
      +'width:'+sz.toFixed(2)+'px;height:'+sz.toFixed(2)+'px;'
      +'background:#FFF5F8;'
      +'opacity:'+(rng()*0.6+0.1).toFixed(2)+';';
    f.appendChild(el);
  }
  c.appendChild(f);
})();
</script>

</body>
</html>
