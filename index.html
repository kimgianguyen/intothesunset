// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, title, children }) {
  return (
    <>
      <div className="twk-sect">{title || label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>

function TweakSelect({ label, value, options, onChange }) {

          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}

}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {

  TweakSlider, TweakToggle, TweakRadio, TweakSelect,

});

<script type="text/babel">
// Torn organic edge — used between sections.
// Generates an irregular SVG path so each instance feels hand-cut.

function makeTornPath(seed = 1, segments = 18, width = 1440, height = 48){
  // Seeded PRNG so torn edges are stable across renders
  let s = seed * 9301 + 49297;
  const rand = () => {
    s = (s * 9301 + 49297) % 233280;
    return s / 233280;
  };
  const step = width / segments;
  let d = `M0,${height} L0,${height * 0.55}`;
  for (let i = 0; i <= segments; i++){
    const x = i * step;
    const baseY = height * 0.4;
    const jitter = (rand() - 0.5) * height * 0.7;
    const y = Math.max(2, Math.min(height - 2, baseY + jitter));
    // alternate sharp & curved control points for an organic torn-paper feel
    if (i % 3 === 0){
      d += ` L${x.toFixed(1)},${y.toFixed(1)}`;
    } else {
      const cx = x - step * 0.5;
      const cy = y + (rand() - 0.5) * 14;
      d += ` Q${cx.toFixed(1)},${cy.toFixed(1)} ${x.toFixed(1)},${y.toFixed(1)}`;
    }
  }
  d += ` L${width},${height} Z`;
  return d;
}

function TornEdge({ fill = '#0A0814', seed = 1, position = 'bottom', height = 56, accent }){
  const path = React.useMemo(() => makeTornPath(seed, 22, 1440, height), [seed, height]);
  const accentPath = React.useMemo(() => makeTornPath(seed + 7, 22, 1440, height * 0.85), [seed, height]);
  return (
    <div
      style={{
        position:'absolute',
        left:0, right:0,
        [position]: -1,
        height,
        pointerEvents:'none',
        zIndex:4,
        transform: position === 'top' ? 'scaleY(-1)' : 'none',
      }}
    >
      <svg viewBox={`0 0 1440 ${height}`} preserveAspectRatio="none" style={{ width:'100%', height:'100%' }}>
        {accent && (
          <path d={accentPath} fill={accent} opacity="0.55" transform={`translate(0, ${height * 0.06})`} />
        )}
        <path d={path} fill={fill} />
      </svg>
    </div>
  );
}

window.TornEdge = TornEdge;

</script>
<script type="text/babel">
// Animation utilities
function useReveal(threshold) {
  threshold = threshold || 0.1;
  const ref = React.useRef(null);
  const [vis, setVis] = React.useState(false);
  React.useEffect(function() {
    const el = ref.current; if (!el) return;
    const io = new IntersectionObserver(function(entries) {
      entries.forEach(function(e) { if (e.isIntersecting) { setVis(true); io.unobserve(el); } });
    }, { threshold: threshold, rootMargin: '0px 0px -72px 0px' });
    io.observe(el);
    return function() { io.disconnect(); };
  }, []);
  return [ref, vis];
}

function RevealEl({ children, d, delay, xStyle }) {
  d = d || 'up'; delay = delay || 0; xStyle = xStyle || {};
  const [ref, vis] = useReveal();
  const inits = { up:'translateY(52px)', left:'translateX(-40px)', right:'translateX(40px)', scale:'scale(0.91) translateY(22px)', fade:'none' };
  return (
    <div ref={ref} style={Object.assign({
      opacity: vis ? 1 : 0,
      transform: vis ? 'none' : (inits[d] || inits.up),
      transition: 'opacity 0.82s cubic-bezier(.22,1,.36,1) '+delay+'s, transform 0.82s cubic-bezier(.22,1,.36,1) '+delay+'s',
      willChange: 'opacity, transform',
    }, xStyle)}>
      {children}
    </div>
  );
}

function useParallax(factor) {
  const ref = React.useRef(null);
  React.useEffect(function() {
    const onScroll = function() {
      const el = ref.current;
      if (el) el.style.transform = 'translateY('+(window.scrollY * factor)+'px)';
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    return function() { window.removeEventListener('scroll', onScroll); };
  }, [factor]);
  return ref;
}

function SunsetOverlay() {
  const [p, setP] = React.useState(0);
  React.useEffect(function() {
    const onScroll = function() {
      const max = document.documentElement.scrollHeight - window.innerHeight;
      if (max > 0) setP(Math.min(1, window.scrollY / max));
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    return function() { window.removeEventListener('scroll', onScroll); };
  }, []);
  const t = Math.max(0, Math.min(1, p / 0.4));
  const fade = t < 0.5 ? t * 2 : (1 - t) * 2;
  const col = p > 0.5
    ? 'rgba(180,50,20,'+(fade*0.11)+')'
    : 'rgba(240,155,10,'+(fade*0.16)+')';
  return (
    <div aria-hidden="true" style={{
      position:'fixed', inset:0, pointerEvents:'none', zIndex:98,
      background: col, mixBlendMode:'screen', transition:'background 0.35s ease',
    }} />
  );
}

window.useReveal = useReveal;
window.RevealEl = RevealEl;
window.useParallax = useParallax;
window.SunsetOverlay = SunsetOverlay;
</script>

                  <span style={{ width: 3, height: 3, borderRadius: '50%', background: 'var(--cream)', display: 'block' }} />
                </div>
              )}
            </div>
          );

            display: 'flex', alignItems: 'center', gap: 2,

            border: '1px solid rgba(253,246,236,0.1)',

            <button

              aria-label="Previous"
              className="lu-dot-btn"
              style={{
                borderRadius: '50%', width: 36, height: 36,

            <button

              className="lu-dot-btn"
              style={{
                borderRadius: '50%', width: 36, height: 36,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontSize: 18, color: 'var(--cream-mute)',

            >›</button>
          </div>
        </div>
      </div>

      {tweaks.tornEdges !== false && (
        <TornEdge
          fill="var(--dusk)"
          accent="var(--coral)"
          seed={7}
          position="bottom"
          height={tweaks.tornHeight != null ? tweaks.tornHeight : 56}
        />
      )}
    </section>
  );
}

window.Lineup = Lineup;

function CTA({ children, primary, href, onClick, tweaks={}, extraClass }){

<script type="text/babel">
const SMOKE_FRAG=`#version 300 es
precision highp float;
out vec4 O;
uniform float time;
uniform vec2 resolution;
uniform vec3 u_color;
#define FC gl_FragCoord.xy
#define R resolution
#define T (time+660.)
float rnd(vec2 p){p=fract(p*vec2(12.9898,78.233));p+=dot(p,p+34.56);return fract(p.x*p.y);}
float noise(vec2 p){vec2 i=floor(p),f=fract(p),u=f*f*(3.-2.*f);return mix(mix(rnd(i),rnd(i+vec2(1,0)),u.x),mix(rnd(i+vec2(0,1)),rnd(i+1.),u.x),u.y);}
float fbm(vec2 p){float t=.0,a=1.;for(int i=0;i<5;i++){t+=a*noise(p);p*=mat2(1,-1.2,.2,1.2)*2.;a*=.5;}return t;}
void main(){
  vec2 uv=(FC-.5*R)/R.y;
  vec3 col=vec3(1);
  uv.x+=.25;uv*=vec2(2,1);
  float n=fbm(uv*.28-vec2(T*.01,0));
  n=noise(uv*3.+n*2.);
  col.r-=fbm(uv+vec2(0,T*.015)+n);
  col.g-=fbm(uv*1.003+vec2(0,T*.015)+n+.003);
  col.b-=fbm(uv*1.006+vec2(0,T*.015)+n+.006);
  col=mix(col,u_color,dot(col,vec3(.21,.71,.07)));
  col=mix(vec3(.08),col,min(time*.1,1.));
  col=clamp(col,.08,1.);
  O=vec4(col,1);
}`;
const SMOKE_VERT=`#version 300 es
precision highp float;
in vec4 position;
void main(){gl_Position=position;}`;

function SmokeCanvas(){
  const ref=React.useRef(null);
  React.useEffect(()=>{
    const canvas=ref.current; if(!canvas)return;
    const gl=canvas.getContext('webgl2'); if(!gl)return;
    const compile=(type,src)=>{ const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s); return s; };
    const vs=compile(gl.VERTEX_SHADER,SMOKE_VERT);
    const fs=compile(gl.FRAGMENT_SHADER,SMOKE_FRAG);
    const prog=gl.createProgram();
    gl.attachShader(prog,vs); gl.attachShader(prog,fs); gl.linkProgram(prog);
    const buf=gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER,buf);
    gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,1,-1,-1,1,1,1,-1]),gl.STATIC_DRAW);
    const pos=gl.getAttribLocation(prog,'position');
    gl.enableVertexAttribArray(pos); gl.vertexAttribPointer(pos,2,gl.FLOAT,false,0,0);
    const uRes=gl.getUniformLocation(prog,'resolution');
    const uTime=gl.getUniformLocation(prog,'time');
    const uColor=gl.getUniformLocation(prog,'u_color');
    const resize=()=>{ const dpr=Math.max(1,window.devicePixelRatio||1); canvas.width=canvas.offsetWidth*dpr; canvas.height=canvas.offsetHeight*dpr; gl.viewport(0,0,canvas.width,canvas.height); };
    resize();
    const ro=new ResizeObserver(resize); ro.observe(canvas);
    let raf;
    const render=(now)=>{ gl.useProgram(prog); gl.uniform2f(uRes,canvas.width,canvas.height); gl.uniform1f(uTime,now*1e-3); gl.uniform3fv(uColor,[1,0.42,0.61]); gl.drawArrays(gl.TRIANGLE_STRIP,0,4); raf=requestAnimationFrame(render); };
    raf=requestAnimationFrame(render);
    return ()=>{ cancelAnimationFrame(raf); ro.disconnect(); };
  },[]);
  return React.createElement('canvas',{ ref, style:{ position:'absolute',inset:0,width:'100%',height:'100%',display:'block',zIndex:0 } });
}

<script type="text/babel">
// Partners / sponsors infinite slider with progressive blur edges
const useReveal = window.useReveal;

// Inject keyframe once when script loads
(function () {
  var s = document.createElement('style');
  s.textContent = '@keyframes partnerSlide{from{transform:translateX(0)}to{transform:translateX(-50%)}}';
  document.head.appendChild(s);
})();

// ---------------------------------------------------------------------------
// ProgressiveBlur — stacked blur layers with gradient masks
// Mirrors the original framer-motion version but uses plain divs
// ---------------------------------------------------------------------------
function ProgressiveBlur({ direction, blurLayers, blurIntensity, style }) {
  direction    = direction    || 'bottom';
  blurLayers   = Math.max(blurLayers   != null ? blurLayers   : 8, 2);
  blurIntensity = blurIntensity != null ? blurIntensity : 0.25;

  const ANGLES = { top: 0, right: 90, bottom: 180, left: 270 };
  const angle  = ANGLES[direction];
  const segSz  = 1 / (blurLayers + 1);

  return (
    <div style={{ position:'relative', ...style }}>
      {Array.from({ length: blurLayers }).map((_, i) => {
        const stops = [i, i + 1, i + 2, i + 3]
          .map(n => n * segSz)
          .map((pos, pi) =>
            `rgba(255,255,255,${pi === 1 || pi === 2 ? 1 : 0}) ${(pos * 100).toFixed(2)}%`
          );
        const grad = `linear-gradient(${angle}deg, ${stops.join(', ')})`;
        return (
          <div
            key={i}
            style={{
              position: 'absolute',
              inset: 0,
              pointerEvents: 'none',
              WebkitMaskImage: grad,
              maskImage: grad,
              backdropFilter: `blur(${i * blurIntensity}px)`,
            }}
          />
        );
      })}
    </div>
  );
}

// ---------------------------------------------------------------------------
// InfiniteSlider — CSS-animation infinite horizontal scroll
// Uses two identical tracks so -50% translate = exact seamless loop
// ---------------------------------------------------------------------------
function InfiniteSlider({ children, gap, duration, reverse, style }) {
  gap      = gap      != null ? gap      : 48;
  duration = duration != null ? duration : 30;
  reverse  = !!reverse;

  const items = React.Children.toArray(children);
  const trackStyle = {
    display: 'inline-flex',
    alignItems: 'center',
    flexShrink: 0,
    gap: gap + 'px',
    paddingRight: gap + 'px',  // closes the gap at the loop seam
  };

  return (
    <div style={{ overflow: 'hidden', ...style }}>
      <div style={{
        display: 'flex',
        animation: `partnerSlide ${duration}s linear infinite`,
        animationDirection: reverse ? 'reverse' : 'normal',
        willChange: 'transform',
      }}>
        <div style={trackStyle}>{items}</div>
        <div style={trackStyle} aria-hidden="true">{items}</div>
        <div style={trackStyle} aria-hidden="true">{items}</div>
        <div style={trackStyle} aria-hidden="true">{items}</div>
      </div>
    </div>
  );
}

// ---------------------------------------------------------------------------
// Logo chip — single partner item
// ---------------------------------------------------------------------------
function PartnerChip({ name, sub, logo }) {
  return (
    <div style={{
      display: 'flex',
      alignItems: 'center',
      justifyContent: 'center',
      flexShrink: 0,
      width: 148,

      ) : (
        <div style={{ textAlign: 'center', padding: '0 12px' }}>
          <div style={{
            fontFamily: 'var(--sans)',
            fontWeight: 700,
            fontSize: 13,
            letterSpacing: '0.08em',
            color: 'var(--cream)',
            opacity: 0.65,
            textTransform: 'uppercase',
            whiteSpace: 'nowrap',
          }}>{name}</div>
          {sub && (
            <div style={{
              fontFamily: 'var(--sans)',
              fontSize: 9,
              letterSpacing: '0.18em',
              color: 'var(--cream-mute)',
              textTransform: 'uppercase',
              marginTop: 3,
              whiteSpace: 'nowrap',
            }}>{sub}</div>
          )}
        </div>
      )}
    </div>
  );
}

// ---------------------------------------------------------------------------
// PartnersSlider — the full section
// ---------------------------------------------------------------------------
function PartnersSlider() {
  const [ref, vis] = useReveal(0.05);

          {partners.map(p => (
            <PartnerChip key={p.id} name={p.name} sub={p.sub} logo={p.logo} />

        {/* Left progressive blur edge */}

          style={{
            position: 'absolute',
            top: 0,
            left: 0,
            height: '100%',
            width: 180,

            zIndex: 2,
          }}

}

function HomeCountdownSection() {
  const t = useLang();
  const [sectionRef, vis] = useReveal(0.05);
  function calc() {
    const diff = ON_SALE_DATE - Date.now();
    if (diff <= 0) return null;
    const s = Math.floor(diff / 1000);
    return { days:Math.floor(s/86400), hours:Math.floor((s%86400)/3600), minutes:Math.floor((s%3600)/60), seconds:s%60 };
  }
  const [rem, setRem] = React.useState(calc);
  React.useEffect(() => { const id = setInterval(() => setRem(calc()), 1000); return () => clearInterval(id); }, []);
  const saleDateStr = t(
    ON_SALE_DATE.toLocaleDateString('en-CA', { month:'long', day:'numeric', year:'numeric' }),
    ON_SALE_DATE.toLocaleDateString('fr-CA', { month:'long', day:'numeric', year:'numeric' })
  );
  const ease = 'cubic-bezier(.22,1,.36,1)';
  const reveal = (delay, dy) => ({
    opacity: vis ? 1 : 0,
    transform: vis ? 'none' : `translateY(${dy || 28}px)`,
    transition: `opacity 0.82s ${ease} ${delay}s, transform 0.82s ${ease} ${delay}s`,
  });

  if (!rem) {
    return (
      <section ref={sectionRef} style={{ position:'relative', background:'var(--night)', padding:'56px 0 64px' }}>
        <div className="wrap" style={{ textAlign:'center' }}>
          <div style={{ display:'inline-flex', alignItems:'center', gap:8, marginBottom:20, ...reveal(0, 16) }}>
            <span style={{ width:6, height:6, borderRadius:'50%', background:'var(--gold)', boxShadow:'0 0 8px var(--gold)', animation:'twinkle 1.5s ease-in-out infinite' }} />
            <span className="label" style={{ color:'var(--gold)', fontSize:10 }}>{t('Tickets are live now','Billets en vente maintenant')}</span>
          </div>
          <h2 className="h-serif" style={{ fontSize:'clamp(36px,5vw,60px)', margin:'0 0 28px', color:'var(--cream)', ...reveal(0.1, 36) }}>
            {t('Get yours before','Obtenez les vôtres')}{' '}
            <span style={{ color:'var(--coral)', fontStyle:'italic' }}>{t('they sell out.','avant que ça soit complet.')}</span>
          </h2>
          <div style={reveal(0.22, 20)}>
            <a href={RA_URL} target="_blank" rel="noopener noreferrer" style={{
              display:'inline-flex', alignItems:'center', gap:8, background:'var(--magenta)', color:'var(--cream)',
              padding:'14px 28px', borderRadius:999, fontSize:12, fontWeight:700, letterSpacing:'0.16em', textTransform:'uppercase',
              boxShadow:'0 0 28px rgba(194,24,91,0.35)', transition:'box-shadow 200ms, transform 160ms',
            }}
              onMouseEnter={e => { e.currentTarget.style.boxShadow='0 0 44px rgba(194,24,91,0.6)'; e.currentTarget.style.transform='translateY(-2px)'; }}
              onMouseLeave={e => { e.currentTarget.style.boxShadow='0 0 28px rgba(194,24,91,0.35)'; e.currentTarget.style.transform='none'; }}
            >{t('Buy on RA','Acheter sur RA')} <span aria-hidden>→</span></a>
          </div>
        </div>
      </section>
    );
  }

  const pad = n => String(n).padStart(2, '0');
  const units = [
    { v:pad(rem.days),    l:t('Days','Jours') },
    { v:pad(rem.hours),   l:t('Hours','Heures') },
    { v:pad(rem.minutes), l:t('Min','Min') },
    { v:pad(rem.seconds), l:t('Sec','Sec') },
  ];
  return (
    <section ref={sectionRef} style={{ position:'relative', background:'var(--night)', padding:'56px 0 64px' }}>
      <div className="wrap" style={{ textAlign:'center' }}>
        <div style={{ display:'inline-flex', alignItems:'center', gap:10, marginBottom:32, ...reveal(0, 16) }}>
          <span style={{ width:20, height:1, background:'var(--gold)', opacity:0.5 }} />
          <span className="label" style={{ color:'var(--gold)', fontSize:10 }}>{t('Tickets on sale','Billets en vente')} · {saleDateStr}</span>
          <span style={{ width:20, height:1, background:'var(--gold)', opacity:0.5 }} />
        </div>
        <div style={{ display:'flex', justifyContent:'center', alignItems:'center', gap:8, flexWrap:'wrap' }}>
          {units.map(({ v, l }, i) => (
            <React.Fragment key={l}>
              <div style={{ background:'rgba(253,246,236,0.04)', border:'1px solid rgba(253,246,236,0.09)', borderRadius:14, padding:'20px 28px 16px', minWidth:96, textAlign:'center', ...reveal(0.08 + i * 0.07, 40) }}>
                <div className="h-serif" style={{ fontSize:'clamp(52px,7vw,80px)', color:'var(--cream)', lineHeight:1, fontVariantNumeric:'tabular-nums', letterSpacing:'-0.02em' }}>{v}</div>
                <div className="label" style={{ fontSize:9, color:'var(--cream-mute)', marginTop:10, letterSpacing:'0.2em' }}>{l}</div>
              </div>
              {i < 3 && <span className="h-serif" style={{ fontSize:'clamp(36px,5vw,56px)', color:'var(--gold)', opacity:0.35, lineHeight:1, marginBottom:20, userSelect:'none', flexShrink:0, ...reveal(0.08 + i * 0.07, 0) }}>:</span>}
            </React.Fragment>
          ))}
        </div>
        <p style={{ fontSize:12, color:'var(--cream-mute)', margin:'28px 0 36px', letterSpacing:'0.04em', ...reveal(0.36, 16) }}>
          {t('Into The Sunset · McGill Lower Field · Sept 11 & 12, 2026','Into The Sunset · Terrain inférieur McGill · 11 et 12 sept. 2026')}
        </p>
        <div style={reveal(0.44, 16)}>
          <CalendarButton />
        </div>
      </div>
    </section>
  );
}
window.HomeCountdownSection = HomeCountdownSection;
</script>

<script>(function(){var root=document.getElementById('root'),done=false;function show(){if(done)return;done=true;root.classList.add('its-ready');}if(root&&root.firstChild){show();}else{var o=new MutationObserver(function(){if(root.firstChild){o.disconnect();show();}});o.observe(root,{childList:true,subtree:true});setTimeout(show,900);}document.addEventListener('click',function(e){var a=e.target.closest('a');if(!a)return;var h=a.getAttribute('href');if(!h||h.startsWith('#')||h.startsWith('http')||h.startsWith('mailto')||h.startsWith('javascript')||a.target==='_blank')return;e.preventDefault();root.classList.remove('its-ready');document.body.classList.add('its-out');setTimeout(function(){location.href=h},270);});})();</script>

<style>

@media(hover:none){#cursor-glow{display:none}}
</style>
<script>
(function(){
  var el=document.getElementById('cursor-glow');
  var mx=0,my=0,cx=0,cy=0,on=false;
  document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY;if(!on){on=true;el.style.opacity='1';}});
  document.addEventListener('mouseleave',function(){el.style.opacity='0';on=false;});
  (function loop(){cx+=(mx-cx)*0.07;cy+=(my-cy)*0.07;el.style.transform='translate(calc('+cx.toFixed(1)+'px - 50%),calc('+cy.toFixed(1)+'px - 50%))';requestAnimationFrame(loop);})();
})();
</script>
