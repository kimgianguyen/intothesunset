const LangContext = React.createContext({ lang:'en', setLang:()=>{} });

function makeTornPath(seed=1, segments=18, width=1440, height=48){
  let s = seed*9301+49297;
  const rand = () => { s=(s*9301+49297)%233280; return s/233280; };
  const step = width/segments;
  let d = `M0,${height} L0,${height*0.55}`;
  for(let i=0;i<=segments;i++){
    const x=i*step, baseY=height*0.4, jitter=(rand()-0.5)*height*0.7;
    const y=Math.max(2,Math.min(height-2,baseY+jitter));
    if(i%3===0){ d+=` L${x.toFixed(1)},${y.toFixed(1)}`; }
    else{ const cx=x-step*0.5, cy=y+(rand()-0.5)*14; d+=` Q${cx.toFixed(1)},${cy.toFixed(1)} ${x.toFixed(1)},${y.toFixed(1)}`; }
  }
  return d+` L${width},${height} Z`;
}
function TornEdge({ fill='#0A0814', seed=1, position='bottom', height=56, accent }){
  const path = React.useMemo(()=>makeTornPath(seed,22,1440,height),[seed,height]);
  const accentPath = React.useMemo(()=>makeTornPath(seed+7,22,1440,height*0.85),[seed,height]);
  return (
    <div style={{ position:'absolute', left:0, right:0, [position]:-1, height, pointerEvents:'none', zIndex:4, transform: position==='top'?'scaleY(-1)':'none' }}>
      <svg viewBox={`0 0 1440 ${height}`} preserveAspectRatio="none" style={{ width:'100%', height:'100%' }}>
        {accent && <path d={accentPath} fill={accent} opacity="0.55" transform={`translate(0,${height*0.06})`} />}
        <path d={path} fill={fill} />
      </svg>
    </div>
  );
}

// ─── Schedule (WebGL smoke + table) ───────────────────────────────────────────
const SMOKE_FRAG=`#version 300 es
precision highp float;
out vec4 O;
uniform float time;
uniform vec2 resolution;
uniform vec3 u_color;
#define FC gl_FragCoord.xy
#define R resolution
#define T (time+660.)
float rnd(vec2 p){p=fract(p*vec2(12.9898,78.233));p+=dot(p,p+34.56);return fract(p.x*p.y);}
float noise(vec2 p){vec2 i=floor(p),f=fract(p),u=f*f*(3.-2.*f);return mix(mix(rnd(i),rnd(i+vec2(1,0)),u.x),mix(rnd(i+vec2(0,1)),rnd(i+1.),u.x),u.y);}
float fbm(vec2 p){float t=.0,a=1.;for(int i=0;i<5;i++){t+=a*noise(p);p*=mat2(1,-1.2,.2,1.2)*2.;a*=.5;}return t;}
void main(){
  vec2 uv=(FC-.5*R)/R.y;
  vec3 col=vec3(1);
  uv.x+=.25;uv*=vec2(2,1);
  float n=fbm(uv*.28-vec2(T*.01,0));
  n=noise(uv*3.+n*2.);
  col.r-=fbm(uv+vec2(0,T*.015)+n);
  col.g-=fbm(uv*1.003+vec2(0,T*.015)+n+.003);
  col.b-=fbm(uv*1.006+vec2(0,T*.015)+n+.006);
  col=mix(col,u_color,dot(col,vec3(.21,.71,.07)));
  col=mix(vec3(.08),col,min(time*.1,1.));
  col=clamp(col,.08,1.);
  O=vec4(col,1);
}`;
const SMOKE_VERT=`#version 300 es
precision highp float;
in vec4 position;
void main(){gl_Position=position;}`;

function SmokeCanvas(){
  const ref=React.useRef(null);
  React.useEffect(()=>{
    const canvas=ref.current; if(!canvas)return;
    const gl=canvas.getContext('webgl2'); if(!gl)return;
    const compile=(type,src)=>{ const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s); return s; };
    const vs=compile(gl.VERTEX_SHADER,SMOKE_VERT);
    const fs=compile(gl.FRAGMENT_SHADER,SMOKE_FRAG);
    const prog=gl.createProgram();
    gl.attachShader(prog,vs); gl.attachShader(prog,fs); gl.linkProgram(prog);
    const buf=gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER,buf);
    gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,1,-1,-1,1,1,1,-1]),gl.STATIC_DRAW);
    const pos=gl.getAttribLocation(prog,'position');
    gl.enableVertexAttribArray(pos); gl.vertexAttribPointer(pos,2,gl.FLOAT,false,0,0);
    const uRes=gl.getUniformLocation(prog,'resolution');
    const uTime=gl.getUniformLocation(prog,'time');
    const uColor=gl.getUniformLocation(prog,'u_color');
    const resize=()=>{ const dpr=Math.max(1,window.devicePixelRatio||1); canvas.width=canvas.offsetWidth*dpr; canvas.height=canvas.offsetHeight*dpr; gl.viewport(0,0,canvas.width,canvas.height); };
    resize();
    const ro=new ResizeObserver(resize); ro.observe(canvas);
    let raf;
    const render=(now)=>{ gl.useProgram(prog); gl.uniform2f(uRes,canvas.width,canvas.height); gl.uniform1f(uTime,now*1e-3); gl.uniform3fv(uColor,[1,0.42,0.61]); gl.drawArrays(gl.TRIANGLE_STRIP,0,4); raf=requestAnimationFrame(render); };
    raf=requestAnimationFrame(render);
    return ()=>{ cancelAnimationFrame(raf); ro.disconnect(); };
  },[]);
  return React.createElement('canvas',{ ref, style:{ position:'absolute',inset:0,width:'100%',height:'100%',display:'block',zIndex:0 } });
}

function ScheduleBlock(){

  return (
    <section style={{ position:'relative',background:'var(--dusk)',padding:'96px 0 100px',overflow:'hidden' }}>

function App(){
  const [lang, setLang] = React.useState(localStorage.getItem('its_lang')||'en');
  const setLangSave = l => { setLang(l); localStorage.setItem('its_lang',l); document.getElementById('html-root').lang=l; };
  React.useEffect(()=>{ document.getElementById('html-root').lang=lang; },[lang]);
  return (
    <LangContext.Provider value={{lang, setLang:setLangSave}}>
      <Nav />
      <PageHero />
      <ScheduleBlock />
      <PassesReminder />
      <Footer />
    </LangContext.Provider>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);

<script>(function(){var root=document.getElementById('root'),done=false;function show(){if(done)return;done=true;root.classList.add('its-ready');}if(root&&root.firstChild){show();}else{var o=new MutationObserver(function(){if(root.firstChild){o.disconnect();show();}});o.observe(root,{childList:true,subtree:true});setTimeout(show,900);}document.addEventListener('click',function(e){var a=e.target.closest('a');if(!a)return;var h=a.getAttribute('href');if(!h||h.startsWith('#')||h.startsWith('http')||h.startsWith('mailto')||h.startsWith('javascript')||a.target==='_blank')return;e.preventDefault();root.classList.remove('its-ready');document.body.classList.add('its-out');setTimeout(function(){location.href=h},270);});})();</script>

<style>
#cursor-glow{position:fixed;top:0;left:0;width:500px;height:500px;border-radius:50%;pointer-events:none;z-index:9998;background:radial-gradient(circle,rgba(255,217,61,0.12) 0%,rgba(255,107,157,0.06) 40%,transparent 68%);opacity:0;transition:opacity 0.5s ease;will-change:transform;}
@media(hover:none){#cursor-glow{display:none}}
</style>
<script>
(function(){
  var el=document.getElementById('cursor-glow');
  var mx=0,my=0,cx=0,cy=0,on=false;
  document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY;if(!on){on=true;el.style.opacity='1';}});
  document.addEventListener('mouseleave',function(){el.style.opacity='0';on=false;});
  (function loop(){cx+=(mx-cx)*0.07;cy+=(my-cy)*0.07;el.style.transform='translate(calc('+cx.toFixed(1)+'px - 50%),calc('+cy.toFixed(1)+'px - 50%))';requestAnimationFrame(loop);})();
})();
</script>
