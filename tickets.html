<script type="text/babel">

// ─── Language system ──────────────────────────────────────────────────────────
const LangContext = React.createContext({ lang:'en', setLang:()=>{} });
function useLang(){
  const {lang} = React.useContext(LangContext);
  return (en, fr) => lang === 'fr' ? fr : en;
}
function LangLink(){
  const {lang, setLang} = React.useContext(LangContext);
  const next = lang === 'en' ? 'fr' : 'en';
  const label = lang === 'en' ? 'Français' : 'English';
  return (
    <button onClick={() => { setLang(next); localStorage.setItem('its_lang',next); document.getElementById('html-root').lang=next; }}
      style={{ background:'none', border:'none', cursor:'pointer', padding:0, fontSize:11, letterSpacing:'0.1em', color:'var(--cream-mute)', transition:'color 160ms', fontFamily:'inherit' }}
      onMouseEnter={e=>e.currentTarget.style.color='var(--cream)'}
      onMouseLeave={e=>e.currentTarget.style.color='var(--cream-mute)'}
    >{label}</button>
  );
}

// ─── Ticket purchase link — update this URL when ready ───────────────────────
const RA_URL = '#'; // TODO: replace '#' with your RA link

    '.benefit-row:last-child{border-bottom:none}',

    '.price-row:last-child{border-bottom:none}',
    '.policy-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}',
    '@media(max-width:900px){.policy-grid{grid-template-columns:repeat(2,1fr)}}',
    '@media(max-width:480px){.policy-grid{grid-template-columns:1fr}}',
  ].join('');
  document.head.appendChild(s);
})();

// ─── Barcode ──────────────────────────────────────────────────────────────────
function Barcode({ dark }) {
  const bars = React.useMemo(() => Array.from({ length: 30 }, () => ({
    w: Math.random() > 0.6 ? 3 : Math.random() > 0.4 ? 2 : 1,
  })), []);
  return (
    <div style={{ flex:'1 1 auto', width:76, position:'relative', overflow:'hidden', marginTop:10, minHeight:40 }}>
      <div style={{
        position:'absolute', top:'50%', left:'50%',
        height:62, width:3000,
        transform:'translate(-50%, -50%) rotate(-90deg)',
        display:'flex', alignItems:'center', gap:2,
      }}>
        {bars.map((b, i) => (
          <span key={i} style={{ width:b.w, height:62, flexShrink:0, background: dark ? '#1a1530' : 'var(--night)', opacity:0.85 }} />
        ))}
      </div>
    </div>
  );
}

// ─── FilledCheck ──────────────────────────────────────────────────────────────
function FilledCheck({ color }){
  return (
    <div style={{ width:18, height:18, borderRadius:'50%', background:color,
      display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, marginTop:2 }}>
      <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
        <path d="M2 5l2.5 2.5L8 2.5" stroke="#fff" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
      </svg>
    </div>
  );
}

// ─── TicketStub ───────────────────────────────────────────────────────────────
function TicketStub({ label, sub, details, cta, theme, featured, flat, ctaHref }) {
  const [hover, setHover] = React.useState(false);
  const isCream  = theme === 'cream';
  const mainBg   = isCream ? 'var(--cream)' : 'linear-gradient(135deg,#E09500 0%,#F07048 60%,#C2185B 110%)';
  const textColor= isCream ? '#1a1530' : 'var(--cream)';
  const subColor = isCream ? 'rgba(26,21,48,0.65)' : 'rgba(253,246,236,0.85)';
  const ctaBg    = isCream ? '#1a1530' : 'var(--night)';
  return (
    <div onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      style={{
        position:'relative',
        transform: hover ? 'translateY(-6px) scale(1.01)' : 'translateY(0) scale(1)',
        boxShadow: hover ? '0 24px 60px rgba(0,0,0,0.65)' : '0 8px 28px rgba(0,0,0,0.45)',
        borderRadius:14, transition:'transform 0.25s ease, box-shadow 0.25s ease',
      }}>
      <div style={{
        display:'grid', gridTemplateColumns: flat ? '1fr' : '1fr 120px',
        background:mainBg, borderRadius:14, overflow:'hidden', position:'relative',
      }}>
        {!flat && <>
          <span style={{ position:'absolute', left:'calc(100% - 120px - 8px)', top:-8,    width:16, height:16, borderRadius:'50%', background:'var(--night)' }} />
          <span style={{ position:'absolute', left:'calc(100% - 120px - 8px)', bottom:-8, width:16, height:16, borderRadius:'50%', background:'var(--night)' }} />
        </>}
        <div style={{ padding:'28px 28px 24px' }}>
          <div className="label" style={{ color:subColor, fontSize:10, marginBottom:12 }}>{sub}</div>
          <div style={{ display:'flex', alignItems:'baseline', gap:12, marginBottom:12 }}>
            <span className="h-serif" style={{ fontSize:60, color:textColor, lineHeight:1 }}>{label}</span>
            {featured && (
              <span style={{ background:'var(--magenta)', color:'var(--cream)', padding:'4px 10px', borderRadius:999, fontSize:9, fontWeight:700, letterSpacing:'0.18em', textTransform:'uppercase' }}>
                Recommended
              </span>
            )}
          </div>
          <p style={{ fontSize:13, color:subColor, margin:'0 0 20px', lineHeight:1.5 }}>{details}</p>
          <a href={ctaHref || '#'} style={{
            background:ctaBg, color:'var(--cream)', padding:'12px 20px', borderRadius:999,
            fontSize:11, fontWeight:600, letterSpacing:'0.16em', textTransform:'uppercase',
            display:'inline-flex', alignItems:'center', gap:8,
          }}>
            {cta} <span aria-hidden>→</span>
          </a>
        </div>
        {!flat && (
          <div style={{
            position:'relative',
            borderLeft:`2px dashed ${isCream ? 'rgba(26,21,48,0.25)' : 'rgba(253,246,236,0.4)'}`,
            display:'flex', flexDirection:'column', alignItems:'center',
            padding:'20px 0',
          }}>
            <div className="label" style={{ color: isCream ? 'rgba(26,21,48,0.5)' : 'rgba(253,246,236,0.65)', fontSize:9, writingMode:'vertical-rl', transform:'rotate(180deg)', letterSpacing:'0.3em', flexShrink:0 }}>
              ITS · 09 · 11–12 · MTL
            </div>
            <Barcode dark={isCream} />
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Nav ──────────────────────────────────────────────────────────────────────
function PageNav() {
  const t = useLang();
  const links=[[t('Programme','Programme'),'programme.html'],[t('Tickets','Billets'),'tickets.html'],[t('The Field','Le Terrain'),'village.html'],['FAQ','faq.html'],[t('Partners','Partenaires'),'partners.html'],[t('Contact','Contact'),'contact.html']];
  const [scrolled, setScrolled] = React.useState(false);
  React.useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 30);
    window.addEventListener('scroll', fn, { passive:true });
    return () => window.removeEventListener('scroll', fn);
  }, []);
  return (
    <nav style={{
      position:'fixed', top:0, left:0, right:0, zIndex:50,
      transition:'background 220ms ease, backdrop-filter 220ms ease, border-color 220ms ease',
      background: scrolled ? 'rgba(10,8,20,0.82)' : 'transparent',
      backdropFilter: scrolled ? 'blur(14px) saturate(140%)' : 'none',
      WebkitBackdropFilter: scrolled ? 'blur(14px) saturate(140%)' : 'none',
      borderBottom: scrolled ? '1px solid rgba(253,246,236,0.08)' : '1px solid transparent',
    }}>
      <div className="wrap" style={{ display:'flex', alignItems:'center', justifyContent:'space-between', height:64 }}>
        <a href="index.html" style={{ display:'flex', alignItems:'center', gap:10 }}>
          <span style={{ width:14, height:14, borderRadius:'50%', background:'radial-gradient(circle at 35% 35%,#FFD27A,var(--gold) 60%,#8a4a00 100%)', boxShadow:'0 0 14px rgba(224,149,0,0.7)' }} />
          <span className="label" style={{ letterSpacing:'0.28em' }}>Into The Sunset</span>
        </a>
        <div style={{ display:'flex', gap:28, alignItems:'center' }}>
          <div style={{ display:'flex', gap:24 }}>
            {links.map(([label, href]) => (
              <a key={href} href={href} className="label" style={{ color:'var(--cream-soft)', fontSize:11, transition:'color 160ms' }}
                onMouseEnter={e => e.currentTarget.style.color = 'var(--gold)'}
                onMouseLeave={e => e.currentTarget.style.color = 'var(--cream-soft)'}
              >{label}</a>
            ))}
          </div>
          <a href="#tickets" style={{ background:'var(--magenta)', color:'var(--cream)', padding:'10px 18px', borderRadius:999, fontSize:12, fontWeight:600, letterSpacing:'0.14em', textTransform:'uppercase', transition:'box-shadow 200ms,transform 160ms' }}
            onMouseEnter={e => { e.currentTarget.style.boxShadow='0 0 24px rgba(194,24,91,0.55)'; e.currentTarget.style.transform='translateY(-1px)'; }}
            onMouseLeave={e => { e.currentTarget.style.boxShadow='none'; e.currentTarget.style.transform='translateY(0)'; }}
          >{t('Get Tickets','Obtenir des billets')}</a>
        </div>
      </div>
    </nav>
  );
}

// ─── CalendarButton ───────────────────────────────────────────────────────────
function CalendarButton() {
  const t = useLang();
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);

  React.useEffect(() => {
    if (!open) return;
    const fn = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', fn);
    return () => document.removeEventListener('mousedown', fn);
  }, [open]);

  // Google Calendar deep link
  // Dates: Sept 11 2026 11 AM EDT → Sept 12 2026 9 PM EDT (UTC offsets applied)
  const googleUrl =
    'https://calendar.google.com/calendar/render?action=TEMPLATE' +
    '&text=Into%20The%20Sunset' +
    '&dates=20260911T150000Z%2F20260913T010000Z' +
    '&details=Into%20The%20Sunset%20%E2%80%94%20McGill%20Lower%20Field%2C%20Montr%C3%A9al%20%C2%B7%20Sept%2011%20%26%2012%2C%202026.%20Gold%20Hour%20Pass%20(11%20AM%E2%80%935%20PM)%20%C2%B7%20Sunset%20Pass%20(11%20AM%E2%80%939%20PM).%20https%3A%2F%2Fkimgianguyen.github.io%2Fintothesunset%2F' +
    '&location=McGill%20Lower%20Field%2C%20Montr%C3%A9al%2C%20QC%2C%20Canada';

  function downloadIcs() {
    const lines = [
      'BEGIN:VCALENDAR',
      'VERSION:2.0',
      'PRODID:-//Into The Sunset//EN',
      'CALSCALE:GREGORIAN',
      'METHOD:PUBLISH',
      'BEGIN:VEVENT',
      'DTSTART:20260911T150000Z',
      'DTEND:20260913T010000Z',
      'SUMMARY:Into The Sunset',
      'DESCRIPTION:Into The Sunset — McGill Lower Field\\, Montréal · Sept 11 & 12\\, 2026.\\nGold Hour Pass (11 AM–5 PM) · Sunset Pass (11 AM–9 PM).\\nTickets: https://kimgianguyen.github.io/intothesunset/',
      'LOCATION:McGill Lower Field\\, Montréal\\, QC\\, Canada',
      'URL:https://kimgianguyen.github.io/intothesunset/',
      'STATUS:CONFIRMED',
      'END:VEVENT',
      'END:VCALENDAR',
    ].join('\r\n');
    const blob = new Blob([lines], { type: 'text/calendar;charset=utf-8' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = 'into-the-sunset-2026.ics';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
    setOpen(false);
  }

  const rowStyle = {
    display:'flex', alignItems:'center', gap:11,
    padding:'11px 14px', borderRadius:10,
    fontSize:13, color:'var(--cream-soft)',
    background:'transparent', border:'none', cursor:'pointer',
    fontFamily:'inherit', textAlign:'left', textDecoration:'none',
    transition:'background 160ms, color 160ms', width:'100%',
    letterSpacing:'0.01em',
  };

  return (
    <div ref={ref} style={{ position:'relative', display:'inline-flex' }}>
      <button
        onClick={() => setOpen(o => !o)}
        style={{
          display:'inline-flex', alignItems:'center', gap:9,
          background:'rgba(224,149,0,0.10)',
          border:'1px solid rgba(224,149,0,0.38)',
          color:'var(--gold)',
          padding:'11px 22px', borderRadius:999,
          fontSize:11, fontWeight:600, letterSpacing:'0.16em', textTransform:'uppercase',
          cursor:'pointer', fontFamily:'inherit',
          transition:'background 180ms, border-color 180ms, box-shadow 180ms',
        }}
        onMouseEnter={e => {
          e.currentTarget.style.background='rgba(224,149,0,0.18)';
          e.currentTarget.style.borderColor='rgba(224,149,0,0.75)';
          e.currentTarget.style.boxShadow='0 0 22px rgba(224,149,0,0.22)';
        }}
        onMouseLeave={e => {
          e.currentTarget.style.background='rgba(224,149,0,0.10)';
          e.currentTarget.style.borderColor='rgba(224,149,0,0.38)';
          e.currentTarget.style.boxShadow='none';
        }}
      >
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
          <rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>
        </svg>
        {t('Add to Calendar','Ajouter au calendrier')}
        <svg width="9" height="9" viewBox="0 0 10 10" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true"
          style={{ opacity:0.6, transform:open?'rotate(180deg)':'none', transition:'transform 220ms cubic-bezier(.22,1,.36,1)' }}>
          <path d="M2 3.5l3 3 3-3"/>
        </svg>
      </button>

      {open && (
        <div style={{
          position:'absolute', top:'calc(100% + 10px)', left:'50%', transform:'translateX(-50%)',
          background:'#1C1A3A',
          border:'1px solid rgba(224,149,0,0.2)',
          borderRadius:16, padding:'8px',
          minWidth:240,
          boxShadow:'0 24px 64px rgba(0,0,0,0.75), 0 0 0 1px rgba(224,149,0,0.06)',
          zIndex:9999,
        }}>
          {/* Event header */}
          <div style={{ padding:'10px 14px 10px', borderBottom:'1px solid rgba(253,246,236,0.07)', marginBottom:6 }}>
            <div className="label" style={{ fontSize:9, color:'var(--gold)', letterSpacing:'0.24em' }}>✦ Into The Sunset</div>
            <div style={{ fontSize:11, color:'var(--cream-mute)', marginTop:4, lineHeight:1.5 }}>
              {t('Sept 11 & 12, 2026 · McGill Lower Field','11 & 12 sept. 2026 · McGill Lower Field')}
            </div>
          </div>
          {/* Google Calendar */}
          <a href={googleUrl} target="_blank" rel="noopener noreferrer"
            onClick={() => setOpen(false)}
            style={rowStyle}
            onMouseEnter={e => { e.currentTarget.style.background='rgba(224,149,0,0.09)'; e.currentTarget.style.color='var(--cream)'; }}
            onMouseLeave={e => { e.currentTarget.style.background='transparent'; e.currentTarget.style.color='var(--cream-soft)'; }}
          >
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <rect width="24" height="24" rx="5" fill="#4285F4"/>
              <rect x="3" y="8" width="18" height="13" rx="2" fill="white"/>
              <rect x="4.5" y="4" width="4" height="6" rx="1.5" fill="white"/>
              <rect x="15.5" y="4" width="4" height="6" rx="1.5" fill="white"/>
            </svg>
            Google Calendar
          </a>
          <div style={{ height:1, background:'rgba(253,246,236,0.06)', margin:'2px 6px' }} />
          {/* Apple / ICS */}
          <button onClick={downloadIcs} style={rowStyle}
            onMouseEnter={e => { e.currentTarget.style.background='rgba(224,149,0,0.09)'; e.currentTarget.style.color='var(--cream)'; }}
            onMouseLeave={e => { e.currentTarget.style.background='transparent'; e.currentTarget.style.color='var(--cream-soft)'; }}
          >
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <rect width="24" height="24" rx="5" fill="#1C1A3A" stroke="rgba(253,246,236,0.18)" strokeWidth="1"/>
              <path d="M12 5.5c1.1-1.3 2.8-1.5 2.8-1.5s.3 1.6-1 2.9c-1.2 1.2-2.7 1-2.7 1s-.2-1.2.9-2.4z" fill="var(--cream-soft)"/>
              <rect x="3" y="9" width="18" height="11" rx="2" fill="rgba(253,246,236,0.12)" stroke="rgba(253,246,236,0.18)" strokeWidth="1"/>
              <path d="M7 14h10M7 17h6" stroke="var(--cream-mute)" strokeWidth="1.4" strokeLinecap="round"/>
            </svg>
            {t('Apple / iCal (.ics)','Apple / iCal (.ics)')}
          </button>
          <p style={{ fontSize:10, color:'rgba(253,246,236,0.28)', margin:'4px 14px 10px', lineHeight:1.55, letterSpacing:'0.02em' }}>
            {t('Also works with Outlook & other calendar apps','Compatible avec Outlook & autres agendas')}
          </p>
        </div>
      )}
    </div>

// ─── Countdown ────────────────────────────────────────────────────────────────
function Countdown() {
  const t = useLang();

  function calc() {
    const diff = ON_SALE_DATE - Date.now();
    if (diff <= 0) return null;
    const s = Math.floor(diff / 1000);
    return {
      days:    Math.floor(s / 86400),
      hours:   Math.floor((s % 86400) / 3600),
      minutes: Math.floor((s % 3600) / 60),
      seconds: s % 60,
    };
  }

  const [rem, setRem] = React.useState(calc);

  React.useEffect(() => {
    const id = setInterval(() => setRem(calc()), 1000);
    return () => clearInterval(id);
  }, []);

  const saleDateStr = t(
    ON_SALE_DATE.toLocaleDateString('en-CA', { month:'long', day:'numeric', year:'numeric' }),
    ON_SALE_DATE.toLocaleDateString('fr-CA', { month:'long', day:'numeric', year:'numeric' })
  );

  // ── After on-sale date: swap countdown for a live CTA ──────────────────────
  if (!rem) {
    return (
      <section style={{ position:'relative', background:'var(--night)', padding:'56px 0' }}>
        <div aria-hidden="true" style={{ position:'absolute', inset:0, pointerEvents:'none', backgroundImage:'radial-gradient(rgba(253,246,236,0.06) 1px, transparent 1px)', backgroundSize:'14px 14px' }} />
        <div className="wrap" style={{ position:'relative', zIndex:1, textAlign:'center' }}>
          <div style={{ display:'inline-flex', alignItems:'center', gap:8, marginBottom:20 }}>
            <span style={{ width:6, height:6, borderRadius:'50%', background:'var(--gold)', boxShadow:'0 0 8px var(--gold)', animation:'twinkle 1.5s ease-in-out infinite' }} />
            <span className="label" style={{ color:'var(--gold)', fontSize:10 }}>
              {t('Tickets are live now', 'Billets en vente maintenant')}
            </span>
          </div>
          <h2 className="h-serif" style={{ fontSize:'clamp(36px,5vw,60px)', margin:'0 0 28px', color:'var(--cream)' }}>
            {t('Get yours before', 'Obtenez les vôtres')}{' '}
            <span style={{ color:'var(--coral)', fontStyle:'italic' }}>{t('they sell out.', 'avant que ça soit complet.')}</span>
          </h2>
          <a href={RA_URL} target="_blank" rel="noopener noreferrer" style={{
            display:'inline-flex', alignItems:'center', gap:8,
            background:'var(--magenta)', color:'var(--cream)',
            padding:'14px 28px', borderRadius:999,
            fontSize:12, fontWeight:700, letterSpacing:'0.16em', textTransform:'uppercase',
            boxShadow:'0 0 28px rgba(194,24,91,0.35)',
            transition:'box-shadow 200ms, transform 160ms',
          }}
          onMouseEnter={e => { e.currentTarget.style.boxShadow='0 0 44px rgba(194,24,91,0.6)'; e.currentTarget.style.transform='translateY(-2px)'; }}
          onMouseLeave={e => { e.currentTarget.style.boxShadow='0 0 28px rgba(194,24,91,0.35)'; e.currentTarget.style.transform='none'; }}
          >{t('Buy on RA', 'Acheter sur RA')} <span aria-hidden>→</span></a>
        </div>
      </section>
    );
  }

  // ── Countdown active ────────────────────────────────────────────────────────
  const pad = n => String(n).padStart(2, '0');
  const units = [
    { v: pad(rem.days),    l: t('Days',  'Jours') },
    { v: pad(rem.hours),   l: t('Hours', 'Heures') },
    { v: pad(rem.minutes), l: t('Min',   'Min') },
    { v: pad(rem.seconds), l: t('Sec',   'Sec') },
  ];

  return (
    <section style={{ position:'relative', background:'var(--night)', padding:'56px 0' }}>
      {/* Dot-grid texture */}
      <div aria-hidden="true" style={{ position:'absolute', inset:0, pointerEvents:'none', backgroundImage:'radial-gradient(rgba(253,246,236,0.06) 1px, transparent 1px)', backgroundSize:'14px 14px' }} />
      {/* Gold horizon line */}
      <div aria-hidden="true" style={{ position:'absolute', bottom:0, left:0, right:0, height:1, background:'linear-gradient(90deg,transparent,rgba(224,149,0,0.25) 30%,rgba(224,149,0,0.25) 70%,transparent)' }} />

      <div className="wrap" style={{ position:'relative', zIndex:1, textAlign:'center' }}>

        {/* Overline label */}
        <div style={{ display:'inline-flex', alignItems:'center', gap:10, marginBottom:32 }}>
          <span style={{ width:20, height:1, background:'var(--gold)', opacity:0.5 }} />
          <span className="label" style={{ color:'var(--gold)', fontSize:10 }}>
            {t('Tickets on sale', 'Billets en vente')} · {saleDateStr}
          </span>
          <span style={{ width:20, height:1, background:'var(--gold)', opacity:0.5 }} />
        </div>

        {/* Number blocks */}
        <div style={{ display:'flex', justifyContent:'center', alignItems:'center', gap:8, flexWrap:'wrap' }}>
          {units.map(({ v, l }, i) => (
            <React.Fragment key={l}>
              <div style={{
                background:'rgba(253,246,236,0.04)',
                border:'1px solid rgba(253,246,236,0.09)',
                borderRadius:14,
                padding:'20px 28px 16px',
                minWidth:96,
                textAlign:'center',
              }}>
                <div className="h-serif" style={{
                  fontSize:'clamp(52px,7vw,80px)',
                  color:'var(--cream)',
                  lineHeight:1,
                  fontVariantNumeric:'tabular-nums',
                  letterSpacing:'-0.02em',
                }}>
                  {v}
                </div>
                <div className="label" style={{ fontSize:9, color:'var(--cream-mute)', marginTop:10, letterSpacing:'0.2em' }}>
                  {l}
                </div>
              </div>
              {i < 3 && (
                <span className="h-serif" style={{
                  fontSize:'clamp(36px,5vw,56px)',
                  color:'var(--gold)',
                  opacity:0.35,
                  lineHeight:1,
                  marginBottom:20,
                  userSelect:'none',
                  flexShrink:0,
                }}>:</span>
              )}
            </React.Fragment>
          ))}
        </div>

        {/* Sub-label */}
        <p style={{ fontSize:12, color:'var(--cream-mute)', margin:'28px 0 0', letterSpacing:'0.04em' }}>
          {t('Into The Sunset · McGill Lower Field · Sept 11 & 12, 2026','Into The Sunset · Terrain inférieur McGill · 11 et 12 sept. 2026')}
        </p>

      </div>
    </section>
  );
}

function App() {
  const [lang, setLang] = React.useState(localStorage.getItem('its_lang') || 'en');
  const setLangSave = l => { setLang(l); localStorage.setItem('its_lang', l); document.getElementById('html-root').lang = l; };
  React.useEffect(() => { document.getElementById('html-root').lang = lang; }, [lang]);
  return (
    <LangContext.Provider value={{ lang, setLang: setLangSave }}>
      <PageNav />
      <Hero />
      <Countdown />
      <div style={{ display:'flex', justifyContent:'center', padding:'40px 0 52px', background:'var(--night)', position:'relative', zIndex:100 }}>
        <div aria-hidden="true" style={{ position:'absolute', inset:0, pointerEvents:'none', backgroundImage:'radial-gradient(rgba(253,246,236,0.06) 1px, transparent 1px)', backgroundSize:'14px 14px' }} />
        <CalendarButton />
      </div>
      <BentoTickets />
      <GoldHourSection />
      <SunsetPassSection />
      <PolicySection />
      <PageFooter />
    </LangContext.Provider>
  );
}

<script>(function(){var root=document.getElementById('root'),done=false;function show(){if(done)return;done=true;root.classList.add('its-ready');}if(root&&root.firstChild){show();}else{var o=new MutationObserver(function(){if(root.firstChild){o.disconnect();show();}});o.observe(root,{childList:true,subtree:true});setTimeout(show,900);}document.addEventListener('click',function(e){var a=e.target.closest('a');if(!a)return;var h=a.getAttribute('href');if(!h||h.startsWith('#')||h.startsWith('http')||h.startsWith('mailto')||h.startsWith('javascript')||a.target==='_blank')return;e.preventDefault();root.classList.remove('its-ready');document.body.classList.add('its-out');setTimeout(function(){location.href=h},270);});})();</script>

<div id="cursor-glow" aria-hidden="true"></div>
<style>
#cursor-glow{position:fixed;top:0;left:0;width:500px;height:500px;border-radius:50%;pointer-events:none;z-index:9998;background:radial-gradient(circle,rgba(255,217,61,0.12) 0%,rgba(255,107,157,0.06) 40%,transparent 68%);opacity:0;transition:opacity 0.5s ease;will-change:transform;}
@media(hover:none){#cursor-glow{display:none}}
</style>
<script>
(function(){
  var el=document.getElementById('cursor-glow');
  var mx=0,my=0,cx=0,cy=0,on=false;
  document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY;if(!on){on=true;el.style.opacity='1';}});
  document.addEventListener('mouseleave',function(){el.style.opacity='0';on=false;});
  (function loop(){cx+=(mx-cx)*0.07;cy+=(my-cy)*0.07;el.style.transform='translate(calc('+cx.toFixed(1)+'px - 50%),calc('+cy.toFixed(1)+'px - 50%))';requestAnimationFrame(loop);})();
})();
</script>
