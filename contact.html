// ─── Language system ──────────────────────────────────────────────────────────
const LangContext = React.createContext({ lang:'en', setLang:()=>{} });
function useLang(){
  const {lang} = React.useContext(LangContext);
  return (en, fr) => lang === 'fr' ? fr : en;
}
function LangLink(){
  const {lang, setLang} = React.useContext(LangContext);
  const next = lang === 'en' ? 'fr' : 'en';
  const label = lang === 'en' ? 'Français' : 'English';
  return (
    <button onClick={() => { setLang(next); localStorage.setItem('its_lang',next); document.getElementById('html-root').lang=next; }}
      style={{ background:'none', border:'none', cursor:'pointer', padding:0, fontSize:11, letterSpacing:'0.1em', color:'var(--cream-mute)', transition:'color 160ms', fontFamily:'inherit' }}
      onMouseEnter={e=>e.currentTarget.style.color='var(--cream)'}
      onMouseLeave={e=>e.currentTarget.style.color='var(--cream-mute)'}
    >{label}</button>
  );
}

// ─── Shared primitives ────────────────────────────────────────────────────────
function SectionLabel({ children, color='var(--gold)' }){
  return <div className="label" style={{ color }}>{children}</div>;
}

function makeTornPath(seed=1,segments=18,width=1440,height=48){
  let s=seed*9301+49297;
  const rng=()=>{ s=(s*9301+49297)%233280; return s/233280; };
  const step=width/segments;
  let d=`M0 ${height}`;
  for(let i=0;i<=segments;i++){
    const x=i*step;
    const y=rng()*height*0.72+(height*0.14);
    d+=` L${x.toFixed(1)} ${y.toFixed(1)}`;
  }
  d+=` L${width} ${height} Z`;
  return d;
}
function TornEdge({ fill='#fff', accent='var(--gold)', seed=1, position='bottom', height=56 }){
  const W=1440;
  const path=makeTornPath(seed,22,W,height);
  const flip=position==='top';
  return (
    <div style={{ position:'absolute',[position]:0,left:0,right:0,height,overflow:'hidden',pointerEvents:'none',transform:flip?'scaleY(-1)':'none' }} aria-hidden="true">
      <svg viewBox={`0 0 ${W} ${height}`} preserveAspectRatio="none" width="100%" height={height} style={{display:'block'}}>
        <path d={path} fill={fill}/>
        <path d={path} fill="none" stroke={accent} strokeWidth="1.2" opacity="0.35"/>
      </svg>
    </div>
  );
}

function ChannelCard({ icon, label, heading, detail, href, accent, rgb }){

// ─── Contact form ─────────────────────────────────────────────────────────────
function ContactForm(){
  const t = useLang();
  const [fields, setFields] = React.useState({ name:'', email:'', subject:'general', message:'' });
  const [sent, setSent] = React.useState(false);
  const [errors, setErrors] = React.useState({});
  const [submitting, setSubmitting] = React.useState(false);
  const [networkError, setNetworkError] = React.useState(false);

  const FORMSPREE_ID = 'YOUR_CONTACT_FORM_ID'; // ← paste your Formspree contact form ID here

  function set(k){ return e => setFields(f => ({...f, [k]:e.target.value})); }

  function validate(){
    const e = {};
    if(!fields.name.trim()) e.name = t('Name is required.','Le nom est requis.');
    if(!fields.email.trim() || !fields.email.includes('@')) e.email = t('Valid email required.','Courriel valide requis.');
    if(!fields.message.trim()) e.message = t('Message cannot be empty.','Le message ne peut pas être vide.');
    return e;
  }

  async function submit(ev){
    ev.preventDefault();
    const e = validate();
    if(Object.keys(e).length){ setErrors(e); return; }
    setErrors({});
    setNetworkError(false);
    setSubmitting(true);
    try {
      const res = await fetch('https://formspree.io/f/' + FORMSPREE_ID, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({
          name: fields.name,
          email: fields.email,
          subject: fields.subject,
          message: fields.message,
        }),
      });
      if(res.ok){ setSent(true); }
      else { setNetworkError(true); }
    } catch(err) { setNetworkError(true); }
    setSubmitting(false);
  }

  const subjects = t(
    [['general','General inquiry'],['media','Media & press'],['partnership','Partnership / sponsorship'],['volunteer','Volunteer application'],['other','Other']],
    [['general','Demande générale'],['media','Médias & presse'],['partnership','Partenariat / commandite'],['volunteer','Candidature bénévole'],['other','Autre']]
  );

  const fieldStyle = (key) => ({
    background: errors[key] ? 'rgba(255,107,157,0.06)' : 'rgba(255,245,248,0.04)',
    border: `1px solid ${errors[key] ? 'rgba(255,107,157,0.45)' : 'rgba(255,245,248,0.12)'}`,
    borderRadius: 10, padding:'13px 16px', width:'100%',
    color:'var(--cream)', fontFamily:'var(--sans)', fontSize:14, outline:'none',
    transition:'border-color 180ms, box-shadow 180ms',
  });

  if(sent){
    return (
      <div style={{
        padding:'52px 40px', borderRadius:20, textAlign:'center',
        background:'rgba(255,217,61,0.04)', border:'1px solid rgba(255,217,61,0.2)',
      }}>
        <div style={{ fontSize:32, marginBottom:16 }}>✦</div>
        <h3 className="h-serif" style={{ fontSize:32, margin:'0 0 14px', color:'var(--gold)' }}>
          {t('Message sent.','Message envoyé.')}
        </h3>
        <p style={{ fontSize:14, color:'var(--cream-mute)', lineHeight:1.6, margin:'0 0 28px' }}>
          {t('We\'ll get back to you within 2 business days.','Nous vous répondrons dans les 2 jours ouvrables.')}
        </p>
        <button onClick={()=>{ setSent(false); setFields({ name:'', email:'', subject:'general', message:'' }); }}
          style={{ background:'none', border:'1px solid rgba(255,217,61,0.35)', color:'var(--gold)', padding:'10px 22px', borderRadius:999, fontSize:11, fontWeight:600, letterSpacing:'0.16em', textTransform:'uppercase', cursor:'pointer', transition:'border-color 160ms' }}
          onMouseEnter={e=>e.currentTarget.style.borderColor='rgba(255,217,61,0.7)'}
          onMouseLeave={e=>e.currentTarget.style.borderColor='rgba(255,217,61,0.35)'}
        >{t('Send another','Envoyer un autre')}</button>
      </div>
    );
  }

  return (
    <form onSubmit={submit} noValidate style={{ display:'flex', flexDirection:'column', gap:18 }}>
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14 }}>
        <div>
          <label style={{ display:'block', fontSize:11, fontWeight:600, letterSpacing:'0.14em', textTransform:'uppercase', color:'var(--cream-mute)', marginBottom:8 }}>{t('Name','Nom')}</label>
          <input
            type="text" value={fields.name} onChange={set('name')}
            placeholder={t('Your name','Votre nom')}
            style={fieldStyle('name')}
            onFocus={e=>{ e.target.style.borderColor='rgba(255,217,61,0.5)'; e.target.style.boxShadow='0 0 0 3px rgba(255,217,61,0.08)'; }}
            onBlur={e=>{ e.target.style.borderColor= errors.name ? 'rgba(255,107,157,0.45)' : 'rgba(255,245,248,0.12)'; e.target.style.boxShadow='none'; }}
          />
          {errors.name && <p style={{ margin:'5px 0 0', fontSize:11, color:'var(--coral)' }}>{errors.name}</p>}
        </div>
        <div>
          <label style={{ display:'block', fontSize:11, fontWeight:600, letterSpacing:'0.14em', textTransform:'uppercase', color:'var(--cream-mute)', marginBottom:8 }}>Email</label>
          <input
            type="email" value={fields.email} onChange={set('email')}
            placeholder={t('your@email.com','votre@courriel.com')}
            style={fieldStyle('email')}
            onFocus={e=>{ e.target.style.borderColor='rgba(255,217,61,0.5)'; e.target.style.boxShadow='0 0 0 3px rgba(255,217,61,0.08)'; }}
            onBlur={e=>{ e.target.style.borderColor= errors.email ? 'rgba(255,107,157,0.45)' : 'rgba(255,245,248,0.12)'; e.target.style.boxShadow='none'; }}
          />
          {errors.email && <p style={{ margin:'5px 0 0', fontSize:11, color:'var(--coral)' }}>{errors.email}</p>}
        </div>
      </div>

      <div>
        <label style={{ display:'block', fontSize:11, fontWeight:600, letterSpacing:'0.14em', textTransform:'uppercase', color:'var(--cream-mute)', marginBottom:8 }}>{t('Subject','Sujet')}</label>
        <div style={{ position:'relative' }}>
          <select value={fields.subject} onChange={set('subject')} style={{ ...fieldStyle('subject'), paddingRight:36, cursor:'pointer', appearance:'none', WebkitAppearance:'none' }}>
            {subjects.map(([val, lbl]) => <option key={val} value={val}>{lbl}</option>)}
          </select>
          <svg style={{ position:'absolute', right:12, top:'50%', transform:'translateY(-50%)', pointerEvents:'none', color:'var(--cream-mute)' }} width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2.5 4.5l3.5 3.5 3.5-3.5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </div>
      </div>

      <div>
        <label style={{ display:'block', fontSize:11, fontWeight:600, letterSpacing:'0.14em', textTransform:'uppercase', color:'var(--cream-mute)', marginBottom:8 }}>{t('Message','Message')}</label>
        <textarea
          value={fields.message} onChange={set('message')}
          placeholder={t('What\'s on your mind?','Qu\'avez-vous en tête ?')}
          rows={5}
          style={fieldStyle('message')}
          onFocus={e=>{ e.target.style.borderColor='rgba(255,217,61,0.5)'; e.target.style.boxShadow='0 0 0 3px rgba(255,217,61,0.08)'; }}
          onBlur={e=>{ e.target.style.borderColor= errors.message ? 'rgba(255,107,157,0.45)' : 'rgba(255,245,248,0.12)'; e.target.style.boxShadow='none'; }}
        />
        {errors.message && <p style={{ margin:'5px 0 0', fontSize:11, color:'var(--coral)' }}>{errors.message}</p>}
      </div>

      <button type="submit" disabled={submitting} style={{
        display:'inline-flex', alignItems:'center', justifyContent:'center', gap:8,
        background:'var(--magenta)', color:'var(--cream)',
        padding:'14px 28px', borderRadius:999,
        fontSize:12, fontWeight:700, letterSpacing:'0.16em', textTransform:'uppercase',
        boxShadow:'0 0 28px rgba(196,76,255,0.3)', transition:'box-shadow 200ms, transform 160ms',
        alignSelf:'flex-start', opacity: submitting ? 0.6 : 1,
      }}
        onMouseEnter={e=>{ if(!submitting){ e.currentTarget.style.boxShadow='0 0 44px rgba(196,76,255,0.55)'; e.currentTarget.style.transform='translateY(-2px)'; }}}
        onMouseLeave={e=>{ e.currentTarget.style.boxShadow='0 0 28px rgba(196,76,255,0.3)'; e.currentTarget.style.transform='none'; }}
      >
        {submitting ? t('Sending…','Envoi…') : <>{t('Send message','Envoyer le message')} <span aria-hidden="true">→</span></>}
      </button>
      {networkError && (
        <p style={{ fontSize:12, color:'var(--coral)', margin:0, letterSpacing:'0.04em' }}>
          {t('Something went wrong — please try again.','Une erreur est survenue — veuillez réessayer.')}
        </p>
      )}
      <p style={{ fontSize:11, color:'rgba(255,245,248,0.25)', margin:0, lineHeight:1.6 }}>
        {t('We typically reply within 2 business days. For urgent day-of questions, DM us on Instagram.','Nous répondons généralement dans les 2 jours ouvrables. Pour les questions urgentes le jour J, envoyez-nous un DM sur Instagram.')}
      </p>
    </form>
  );
}

function App(){

  const setLangSave = l => { setLang(l); localStorage.setItem('its_lang',l); document.getElementById('html-root').lang=l; };
  React.useEffect(()=>{ document.getElementById('html-root').lang=lang; },[lang]);
  return (
    <LangContext.Provider value={{lang, setLang:setLangSave}}>
      <Nav />
      <PageHero />
      <ChannelsSection />
      <ContactSection />
      <Footer />
    </LangContext.Provider>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);

<script>(function(){var root=document.getElementById('root'),done=false;function show(){if(done)return;done=true;root.classList.add('its-ready');}if(root&&root.firstChild){show();}else{var o=new MutationObserver(function(){if(root.firstChild){o.disconnect();show();}});o.observe(root,{childList:true,subtree:true});setTimeout(show,900);}document.addEventListener('click',function(e){var a=e.target.closest('a');if(!a)return;var h=a.getAttribute('href');if(!h||h.startsWith('#')||h.startsWith('http')||h.startsWith('mailto')||h.startsWith('javascript')||a.target==='_blank')return;e.preventDefault();root.classList.remove('its-ready');document.body.classList.add('its-out');setTimeout(function(){location.href=h},270);});})();</script>

<div id="cursor-glow" aria-hidden="true"></div>
<style>
#cursor-glow{position:fixed;top:0;left:0;width:500px;height:500px;border-radius:50%;pointer-events:none;z-index:9998;background:radial-gradient(circle,rgba(255,217,61,0.12) 0%,rgba(255,107,157,0.06) 40%,transparent 68%);opacity:0;transition:opacity 0.5s ease;will-change:transform;}
@media(hover:none){#cursor-glow{display:none}}
</style>
<script>
(function(){
  var el=document.getElementById('cursor-glow');
  var mx=0,my=0,cx=0,cy=0,on=false;
  document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY;if(!on){on=true;el.style.opacity='1';}});
  document.addEventListener('mouseleave',function(){el.style.opacity='0';on=false;});
  (function loop(){cx+=(mx-cx)*0.07;cy+=(my-cy)*0.07;el.style.transform='translate(calc('+cx.toFixed(1)+'px - 50%),calc('+cy.toFixed(1)+'px - 50%))';requestAnimationFrame(loop);})();
})();
</script>
