// ─── Language system ──────────────────────────────────────────────────────────
const LangContext = React.createContext({ lang:'en', setLang:()=>{} });
function useLang(){
  const {lang} = React.useContext(LangContext);
  return (en, fr) => lang === 'fr' ? fr : en;
}
function LangLink(){
  const {lang, setLang} = React.useContext(LangContext);
  const next = lang === 'en' ? 'fr' : 'en';
  const label = lang === 'en' ? 'Français' : 'English';
  return (
    <button onClick={() => { setLang(next); localStorage.setItem('its_lang',next); document.getElementById('html-root').lang=next; }}
      style={{ background:'none', border:'none', cursor:'pointer', padding:0, fontSize:11, letterSpacing:'0.1em', color:'var(--cream-mute)', transition:'color 160ms', fontFamily:'inherit' }}
      onMouseEnter={e=>e.currentTarget.style.color='var(--cream)'}
      onMouseLeave={e=>e.currentTarget.style.color='var(--cream-mute)'}
    >{label}</button>
  );
}

// ─── Shared primitives ────────────────────────────────────────────────────────
function SectionLabel({ children, color='var(--gold)' }){

}

function makeTornPath(seed=1,segments=18,width=1440,height=48){
  let s=seed*9301+49297;
  const rand=()=>{ s=(s*9301+49297)%233280; return s/233280; };
  const step=width/segments;
  let d=`M0,${height} L0,${height*0.55}`;
  for(let i=0;i<=segments;i++){
    const x=i*step,baseY=height*0.4,jitter=(rand()-0.5)*height*0.7;
    const y=Math.max(2,Math.min(height-2,baseY+jitter));
    if(i%3===0){ d+=` L${x.toFixed(1)},${y.toFixed(1)}`; }
    else{ const cx=x-step*0.5,cy=y+(rand()-0.5)*14; d+=` Q${cx.toFixed(1)},${cy.toFixed(1)} ${x.toFixed(1)},${y.toFixed(1)}`; }
  }
  return d+` L${width},${height} Z`;
}
function TornEdge({ fill='#0A0814',seed=1,position='bottom',height=56,accent }){
  const path=React.useMemo(()=>makeTornPath(seed,22,1440,height),[seed,height]);
  const aPath=React.useMemo(()=>makeTornPath(seed+7,22,1440,height*0.85),[seed,height]);
  return (
    <div style={{ position:'absolute',left:0,right:0,[position]:-1,height,pointerEvents:'none',zIndex:4,transform:position==='top'?'scaleY(-1)':'none' }}>
      <svg viewBox={`0 0 1440 ${height}`} preserveAspectRatio="none" style={{ width:'100%',height:'100%' }}>
        {accent&&<path d={aPath} fill={accent} opacity="0.55" transform={`translate(0,${height*0.06})`} />}
        <path d={path} fill={fill} />
      </svg>
    </div>
  );
}

          <span className="label" style={{ letterSpacing:'0.28em' }}>Into The Sunset</span>
        </a>
        <div style={{ display:'flex',gap:28,alignItems:'center' }}>
          <div style={{ display:'flex',gap:24 }}>

              <a key={href} href={href} className="label" style={{ color:'var(--cream-soft)',fontSize:11,transition:'color 160ms' }}

}

// ─── Station cards ────────────────────────────────────────────────────────────
function StationCard({ name, desc, accent, icon, idx }){
  const [hover,setHover]=React.useState(false);
  const tilt=idx%3===1?0.6:idx%3===2?-0.4:0.2;
  return (
    <article onMouseEnter={()=>setHover(true)} onMouseLeave={()=>setHover(false)}
      style={{ position:'relative',background:'rgba(45,31,79,0.6)',border:'1px solid rgba(255,245,248,0.07)',borderRadius:14,padding:'28px 24px 26px',
        transform:hover?`translateY(-4px) rotate(${tilt*0.3}deg)`:`rotate(${tilt}deg)`,
        boxShadow:hover?`0 18px 40px rgba(0,0,0,0.5), 0 0 0 1px ${accent}55`:'0 6px 16px rgba(0,0,0,0.35)',
        transition:'transform 240ms ease, box-shadow 240ms ease', overflow:'hidden' }}>
      <div style={{ position:'absolute',left:0,top:0,bottom:0,width:3,background:accent }} />
      <div style={{ display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:18 }}>
        <span className="label" style={{ color:'var(--cream-mute)',fontSize:10 }}>0{idx+1} · Station</span>
        <span style={{ fontSize:24,color:accent,lineHeight:1 }}>{icon}</span>
      </div>
      <h3 className="h-serif" style={{ fontSize:26,margin:'0 0 10px' }}>{name}</h3>
      <p style={{ fontSize:14,lineHeight:1.5,color:'var(--cream-soft)',margin:0 }}>{desc}</p>
    </article>
  );
}

              {/* North compass */}
              <g transform="translate(723,93)">
                <circle r="13" fill="rgba(255,245,248,0.03)" stroke="rgba(255,245,248,0.1)" strokeWidth="1"/>

              </g>

              {/* Zone markers */}
              {zones.map(z=>{
                const on=active===z.id;
                const lblY=z.cy+40;
                return (
                  <g key={z.id}
                    onClick={()=>setSelected(selected===z.id?null:z.id)}
                    onMouseEnter={()=>setHovered(z.id)}
                    style={{cursor:'pointer'}}
                    role="button"
                    tabIndex={0}
                    aria-label={z.name}
                    aria-pressed={selected===z.id}
                    onKeyDown={e=>e.key==='Enter'&&setSelected(selected===z.id?null:z.id)}
                  >
                    {on&&<circle cx={z.cx} cy={z.cy} r="36" fill={`rgba(${z.rgb},0.16)`}/>}

              </div>
            </div>
          ):(

            </p>
          )}
        </div>

      </div>
    </section>
  );

  return (
    <LangContext.Provider value={{lang, setLang:setLangSave}}>

      <PageHero />
      <VillageSection />
      <FieldMapSection />
      <GetThereSection />
      <AccessSection />
      <Footer />
    </LangContext.Provider>
  );
}

<script>(function(){var root=document.getElementById('root'),done=false;function show(){if(done)return;done=true;root.classList.add('its-ready');}if(root&&root.firstChild){show();}else{var o=new MutationObserver(function(){if(root.firstChild){o.disconnect();show();}});o.observe(root,{childList:true,subtree:true});setTimeout(show,900);}document.addEventListener('click',function(e){var a=e.target.closest('a');if(!a)return;var h=a.getAttribute('href');if(!h||h.startsWith('#')||h.startsWith('http')||h.startsWith('mailto')||h.startsWith('javascript')||a.target==='_blank')return;e.preventDefault();root.classList.remove('its-ready');document.body.classList.add('its-out');setTimeout(function(){location.href=h},270);});})();</script>

<div id="cursor-glow" aria-hidden="true"></div>
<style>
#cursor-glow{position:fixed;top:0;left:0;width:500px;height:500px;border-radius:50%;pointer-events:none;z-index:9998;background:radial-gradient(circle,rgba(255,217,61,0.12) 0%,rgba(255,107,157,0.06) 40%,transparent 68%);opacity:0;transition:opacity 0.5s ease;will-change:transform;}
@media(hover:none){#cursor-glow{display:none}}
</style>
<script>
(function(){
  var el=document.getElementById('cursor-glow');
  var mx=0,my=0,cx=0,cy=0,on=false;
  document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY;if(!on){on=true;el.style.opacity='1';}});
  document.addEventListener('mouseleave',function(){el.style.opacity='0';on=false;});
  (function loop(){cx+=(mx-cx)*0.07;cy+=(my-cy)*0.07;el.style.transform='translate(calc('+cx.toFixed(1)+'px - 50%),calc('+cy.toFixed(1)+'px - 50%))';requestAnimationFrame(loop);})();
})();
</script>
