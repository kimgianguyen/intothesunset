<!doctype html>
<html lang="en" id="html-root">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Page Not Found — Into The Sunset</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#0A0814">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Bowlby+One&display=swap" rel="stylesheet">
<style>
  :root {
    --night:   #0A0814;
    --dusk:    #1C1A3A;
    --plum:    #2D1B6B;
    --gold:    #E09500;
    --coral:   #F07048;
    --magenta: #C2185B;
    --cream:   #FDF6EC;
    --cream-soft: rgba(253,246,236,0.9);
    --cream-mute: rgba(253,246,236,0.55);
    --serif: "Bowlby One", Georgia, serif;
    --sans:  "Inter", system-ui, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    height: 100%;
    background: var(--night);
    color: var(--cream);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
  }

  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }

  .label {
    font-family: var(--sans);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    font-size: 11px;
  }

  .wrap { max-width: 1280px; margin: 0 auto; padding: 0 32px; }
  @media (max-width: 720px) { .wrap { padding: 0 20px; } }

  /* ── Stars ─────────────────────────────────────────────────────────── */
  .stars {
    position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0;
  }
  .star {
    position: absolute;
    width: 2px; height: 2px;
    border-radius: 50%;
    background: var(--cream);
    opacity: 0;
    animation: twinkle var(--dur, 3s) var(--del, 0s) infinite ease-in-out;
  }
  @keyframes twinkle {
    0%,100% { opacity: 0; }
    50%      { opacity: var(--peak, 0.6); }
  }

  /* ── Gradient glow ──────────────────────────────────────────────────── */
  .glow {
    position: fixed;
    bottom: -120px; left: 50%;
    transform: translateX(-50%);
    width: 700px; height: 340px;
    background: radial-gradient(ellipse at 50% 100%, rgba(224,149,0,0.18) 0%, rgba(194,24,91,0.10) 50%, transparent 80%);
    pointer-events: none; z-index: 0;
    filter: blur(8px);
  }

  /* ── Nav ────────────────────────────────────────────────────────────── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 0;
  }
  .nav-inner {
    display: flex; align-items: center; justify-content: space-between;
    height: 64px;
  }
  .nav-logo {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--sans); font-weight: 600;
    font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--cream-soft);
    transition: color 160ms;
  }
  .nav-logo:hover { color: var(--cream); }
  .nav-sun {
    width: 14px; height: 14px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #FFD27A, var(--gold) 60%, #8a4a00 100%);
    box-shadow: 0 0 14px rgba(224,149,0,0.7);
    flex-shrink: 0;
  }
  .nav-cta {
    background: var(--magenta);
    color: var(--cream);
    padding: 10px 18px;
    border-radius: 999px;
    font-size: 12px; font-weight: 600;
    letter-spacing: 0.14em; text-transform: uppercase;
    transition: box-shadow 200ms, transform 160ms;
  }
  .nav-cta:hover {
    box-shadow: 0 0 24px rgba(194,24,91,0.55);
    transform: translateY(-1px);
  }

  /* ── Main content ───────────────────────────────────────────────────── */
  main {
    position: relative; z-index: 1;
    min-height: 100dvh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    padding: 120px 32px 80px;
  }

  .badge {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.28em; text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 0.6s 0.1s cubic-bezier(.22,1,.36,1) forwards;
  }
  .badge-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--gold); opacity: 0.7;
  }

  .four-o-four {
    font-family: var(--serif);
    font-size: clamp(120px, 20vw, 220px);
    line-height: 0.88;
    letter-spacing: -0.02em;
    text-transform: uppercase;
    background: linear-gradient(160deg, #FFD27A 0%, var(--gold) 45%, #C2185B 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin: 0 0 28px;
    opacity: 0;
    animation: fadeUp 0.7s 0.2s cubic-bezier(.22,1,.36,1) forwards;
    user-select: none;
  }

  .headline {
    font-family: var(--serif);
    font-size: clamp(22px, 4vw, 38px);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--cream);
    margin: 0 0 16px;
    opacity: 0;
    animation: fadeUp 0.7s 0.3s cubic-bezier(.22,1,.36,1) forwards;
  }

  .sub {
    font-size: 15px;
    color: var(--cream-mute);
    line-height: 1.65;
    max-width: 400px;
    margin: 0 auto 40px;
    opacity: 0;
    animation: fadeUp 0.7s 0.4s cubic-bezier(.22,1,.36,1) forwards;
  }

  .btn-home {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--magenta);
    color: var(--cream);
    padding: 14px 28px;
    border-radius: 999px;
    font-size: 12px; font-weight: 600;
    letter-spacing: 0.14em; text-transform: uppercase;
    transition: box-shadow 200ms, transform 160ms;
    opacity: 0;
    animation: fadeUp 0.7s 0.5s cubic-bezier(.22,1,.36,1) forwards;
  }
  .btn-home:hover {
    box-shadow: 0 0 28px rgba(194,24,91,0.55);
    transform: translateY(-2px);
  }
  .btn-arrow { font-size: 14px; transition: transform 200ms; }
  .btn-home:hover .btn-arrow { transform: translateX(3px); }

  @keyframes fadeUp {
    from { opacity:0; transform: translateY(20px); }
    to   { opacity:1; transform: none; }
  }

  /* ── Footer ─────────────────────────────────────────────────────────── */
  footer {
    position: relative; z-index: 1;
    border-top: 1px solid rgba(253,246,236,0.07);
    padding: 28px 0;
    margin-top: auto;
  }
  .footer-inner {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 12px;
    font-size: 11px; letter-spacing: 0.1em;
    color: var(--cream-mute);
  }
  .footer-links {
    display: flex; align-items: center; gap: 16px;
  }
  .footer-links a,
  .footer-links button {
    font-size: 11px; letter-spacing: 0.1em;
    color: var(--cream-mute);
    transition: color 160ms;
    padding: 0; background: none; border: none; cursor: pointer;
    font-family: inherit;
  }
  .footer-links a:hover,
  .footer-links button:hover { color: var(--cream); }
</style>
</head>
<body>

<!-- Stars background -->
<div class="stars" id="stars"></div>
<div class="glow"></div>

<!-- Nav -->
<nav>
  <div class="wrap nav-inner">
    <a href="index.html" class="nav-logo">
      <span class="nav-sun"></span>
      <span class="label">Into The Sunset</span>
    </a>
    <a href="tickets.html" class="nav-cta label" id="nav-cta">Get Tickets</a>
  </div>
</nav>

<!-- Main -->
<main>
  <div class="badge">
    <span class="badge-dot"></span>
    <span id="badge-text">Error</span>
    <span class="badge-dot"></span>
  </div>
  <div class="four-o-four">404</div>
  <h1 class="headline" id="headline">Lost in the golden hour</h1>
  <p class="sub" id="sub">This page wandered off past the horizon.<br>Let's get you back before the sun goes down.</p>
  <a href="index.html" class="btn-home">
    <span id="btn-label">Back to Home</span>
    <span class="btn-arrow">→</span>
  </a>
</main>

<!-- Footer -->
<footer>
  <div class="wrap footer-inner">
    <span>© 2026 MomentsThatLive · <span id="footer-copy">Produced in partnership with EUS, McGill University · Montréal, QC</span></span>
    <div class="footer-links">
      <a href="#" aria-label="Instagram" title="Instagram" style="display:flex;align-items:center;gap:7px">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none"/></svg>
        Instagram
      </a>
      <a href="#" aria-label="TikTok" title="TikTok" style="display:flex;align-items:center;gap:7px">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.27 6.27 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.76a4.85 4.85 0 0 1-1.01-.07z"/></svg>
        TikTok
      </a>
      <span style="width:1px;height:12px;background:rgba(253,246,236,0.15);display:inline-block"></span>
      <a href="privacy.html" id="link-privacy">Privacy</a>
      <a href="terms.html" id="link-terms">Terms</a>
      <a href="#" id="link-press">Press</a>
      <button id="lang-btn" onclick="toggleLang()"></button>
    </div>
  </div>
</footer>

<script>
  // ── Stars ────────────────────────────────────────────────────────────
  (function(){
    var container = document.getElementById('stars');
    for (var i = 0; i < 90; i++) {
      var s = document.createElement('div');
      s.className = 'star';
      s.style.left   = Math.random() * 100 + '%';
      s.style.top    = Math.random() * 100 + '%';
      s.style.setProperty('--dur',  (2.5 + Math.random() * 3.5).toFixed(2) + 's');
      s.style.setProperty('--del',  (Math.random() * 4).toFixed(2) + 's');
      s.style.setProperty('--peak', (0.3 + Math.random() * 0.55).toFixed(2));
      s.style.width = s.style.height = (Math.random() < 0.3 ? 3 : 2) + 'px';
      container.appendChild(s);
    }
  })();

  // ── Translations ─────────────────────────────────────────────────────
  var i18n = {
    en: {
      navCta:      'Get Tickets',
      badge:       'Error',
      headline:    'Lost in the golden hour',
      sub:         'This page wandered off past the horizon.\nLet's get you back before the sun goes down.',
      btn:         'Back to Home',
      footerCopy:  'Produced in partnership with EUS, McGill University · Montréal, QC',
      privacy:     'Privacy',
      terms:       'Terms',
      press:       'Press',
      langBtn:     'Français',
    },
    fr: {
      navCta:      'Obtenir des billets',
      badge:       'Erreur',
      headline:    'Perdus dans l\'heure dorée',
      sub:         'Cette page s\'est égarée au-delà de l\'horizon.\nRevenons avant que le soleil se couche.',
      btn:         'Retour à l\'accueil',
      footerCopy:  'Produit en partenariat avec l\'EUS, Université McGill · Montréal, QC',
      privacy:     'Confidentialité',
      terms:       'Modalités',
      press:       'Presse',
      langBtn:     'English',
    }
  };

  function applyLang(lang) {
    var t = i18n[lang] || i18n.en;
    document.getElementById('html-root').lang = lang;
    document.getElementById('nav-cta').textContent      = t.navCta;
    document.getElementById('badge-text').textContent   = t.badge;
    document.getElementById('headline').textContent     = t.headline;
    document.getElementById('sub').innerHTML            = t.sub.replace('\n', '<br>');
    document.getElementById('btn-label').textContent    = t.btn;
    document.getElementById('footer-copy').textContent  = t.footerCopy;
    document.getElementById('link-privacy').textContent = t.privacy;
    document.getElementById('link-terms').textContent   = t.terms;
    document.getElementById('link-press').textContent   = t.press;
    document.getElementById('lang-btn').textContent     = t.langBtn;
  }

  function toggleLang() {
    var current = localStorage.getItem('its_lang') || 'en';
    var next = current === 'en' ? 'fr' : 'en';
    localStorage.setItem('its_lang', next);
    applyLang(next);
  }

  // Init from localStorage
  applyLang(localStorage.getItem('its_lang') || 'en');
</script>
</body>
</html>
