<script type="text/babel">

// ─── Language infrastructure ───────────────────────────────────────────────────
const LangContext = React.createContext({ lang:'en', setLang:()=>{} });
function useLang(){
  const { lang } = React.useContext(LangContext);
  return (en, fr) => lang === 'fr' ? fr : en;
}
function LangLink(){
  const { lang, setLang } = React.useContext(LangContext);
  const next = lang === 'en' ? 'fr' : 'en';
  const label = lang === 'en' ? 'Français' : 'English';
  return (
    <button onClick={() => { setLang(next); localStorage.setItem('its_lang',next); document.getElementById('html-root').lang=next; }}
      style={{ background:'none', border:'none', cursor:'pointer', padding:0, fontSize:11, letterSpacing:'0.1em', color:'var(--cream-mute)', transition:'color 160ms', fontFamily:'inherit' }}
      onMouseEnter={e=>e.currentTarget.style.color='var(--cream)'}
      onMouseLeave={e=>e.currentTarget.style.color='var(--cream-mute)'}
    >{label}</button>
  );
}

// ─── Nav ──────────────────────────────────────────────────────────────────────

    [['Programme','programme.html'],['Billets','tickets.html'],['Le Terrain','village.html'],['FAQ','faq.html'],['Partenaires','partners.html'],['Contact','contact.html']]
  );
  const [scrolled, setScrolled] = React.useState(false);
  React.useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 30);
    window.addEventListener('scroll', fn, { passive:true });
    return () => window.removeEventListener('scroll', fn);
  }, []);
  return (
    <nav style={{
      position:'fixed', top:0, left:0, right:0, zIndex:50,
      transition:'background 220ms ease, backdrop-filter 220ms ease, border-color 220ms ease',
      background: scrolled ? 'rgba(10,8,20,0.82)' : 'transparent',
      backdropFilter: scrolled ? 'blur(14px) saturate(140%)' : 'none',
      WebkitBackdropFilter: scrolled ? 'blur(14px) saturate(140%)' : 'none',
      borderBottom: scrolled ? '1px solid rgba(253,246,236,0.08)' : '1px solid transparent',
    }}>
      <div className="wrap" style={{ display:'flex', alignItems:'center', justifyContent:'space-between', height:64 }}>
        <a href="index.html" style={{ display:'flex', alignItems:'center', gap:10 }}>
          <span style={{ width:14, height:14, borderRadius:'50%', background:'radial-gradient(circle at 35% 35%,#FFD27A,var(--gold) 60%,#8a4a00 100%)', boxShadow:'0 0 14px rgba(224,149,0,0.7)' }} />
          <span className="label" style={{ letterSpacing:'0.28em' }}>Into The Sunset</span>
        </a>
        <div style={{ display:'flex', gap:28, alignItems:'center' }}>
          <div style={{ display:'flex', gap:24 }}>
            {links.map(([label, href]) => (
              <a key={href} href={href} className="label" style={{ color:'var(--cream-soft)', fontSize:11, transition:'color 160ms' }}
                onMouseEnter={e => e.currentTarget.style.color='var(--gold)'}
                onMouseLeave={e => e.currentTarget.style.color='var(--cream-soft)'}
              >{label}</a>
            ))}
          </div>
          <a href="tickets.html" style={{ background:'var(--magenta)', color:'var(--cream)', padding:'10px 18px', borderRadius:999, fontSize:12, fontWeight:600, letterSpacing:'0.14em', textTransform:'uppercase', transition:'box-shadow 200ms,transform 160ms' }}
            onMouseEnter={e => { e.currentTarget.style.boxShadow='0 0 24px rgba(194,24,91,0.55)'; e.currentTarget.style.transform='translateY(-1px)'; }}
            onMouseLeave={e => { e.currentTarget.style.boxShadow='none'; e.currentTarget.style.transform='translateY(0)'; }}
          >{t('Get Tickets','Obtenir des billets')}</a>
        </div>

// ─── DynamicIslandTOC ─────────────────────────────────────────────────────────
function DynamicIslandTOC() {
  const [headings, setHeadings]   = React.useState([]);
  const [activeId, setActiveId]   = React.useState(null);
  const [hoveredId, setHoveredId] = React.useState(null);
  const [isExpanded, setIsExpanded] = React.useState(false);
  const [progress, setProgress]   = React.useState(0);
  const [visible, setVisible]     = React.useState(false);

  // Scan headings after mount
  React.useEffect(() => {
    const timer = setTimeout(() => {
      const els = Array.from(document.querySelectorAll('article h2, article h3'));
      const parsed = els.map((el, i) => {
        if (!el.id) {
          el.id = (el.textContent || '').toLowerCase().replace(/\s+/g,'-').replace(/[^\w-]/g,'') || `s-${i}`;
        }
        return { id: el.id, text: el.textContent, level: parseInt(el.tagName[1]), element: el };
      });
      setHeadings(parsed);
      setTimeout(() => setVisible(true), 100);
    }, 120);
    return () => clearTimeout(timer);
  }, []);

  // Scroll spy + progress
  React.useEffect(() => {
    const onScroll = () => {
      let cur = null;
      for (const h of headings) {
        if (h.element.getBoundingClientRect().top <= 120) cur = h.id;
        else break;
      }
      if (!cur && headings.length) cur = headings[0].id;
      setActiveId(cur);
      const total = document.documentElement.scrollHeight - window.innerHeight;
      setProgress(total > 0 ? Math.min(100, Math.max(0, (window.scrollY / total) * 100)) : 0);
    };
    window.addEventListener('scroll', onScroll, { passive:true });
    onScroll();
    return () => window.removeEventListener('scroll', onScroll);
  }, [headings]);

  const activeHeading = headings.find(h => h.id === activeId);
  const minLevel = headings.length ? Math.min(...headings.map(h => h.level)) : 1;

  // Progress ring
  const sz = 24, sw = 2.5, r = (sz - sw) / 2;
  const circ = 2 * Math.PI * r;
  const dashOffset = circ - (progress / 100) * circ;

  return (
    <>
      {/* Backdrop */}
      <div style={{
        position:'fixed', inset:0, zIndex:9998,
        background:'rgba(0,0,0,0.45)', backdropFilter:'blur(4px)',
        WebkitBackdropFilter:'blur(4px)',
        opacity: isExpanded ? 1 : 0,
        pointerEvents: isExpanded ? 'auto' : 'none',
        transition:'opacity 0.35s ease',
      }} onClick={() => setIsExpanded(false)} />

      {/* Island */}
      <div style={{
        position:'fixed', bottom:28, left:'50%',
        transform: visible ? 'translateX(-50%) translateY(0)' : 'translateX(-50%) translateY(20px)',
        opacity: visible ? 1 : 0,
        zIndex:9999,
        width: isExpanded ? 340 : 280,
        height: isExpanded ? 420 : 52,
        borderRadius: isExpanded ? 24 : 26,
        background:'var(--dusk)',
        border:'1px solid rgba(253,246,236,0.12)',
        boxShadow: isExpanded
          ? '0 24px 64px rgba(0,0,0,0.7), 0 0 0 1px rgba(224,149,0,0.15)'
          : '0 8px 32px rgba(0,0,0,0.55)',
        overflow:'hidden',
        cursor: isExpanded ? 'default' : 'pointer',
        transition:'width 0.5s cubic-bezier(0.22,1,0.36,1), height 0.5s cubic-bezier(0.22,1,0.36,1), border-radius 0.5s cubic-bezier(0.22,1,0.36,1), opacity 0.6s ease, transform 0.6s ease, box-shadow 0.3s ease',
      }} onClick={() => { if (!isExpanded) setIsExpanded(true); }}>

        {/* ── Closed pill ── */}
        <div style={{
          position:'absolute', inset:0,
          display:'flex', alignItems:'center', gap:14, padding:'0 18px',
          opacity: isExpanded ? 0 : 1,
          transform: isExpanded ? 'scale(0.96)' : 'scale(1)',
          transition:'opacity 0.2s ease, transform 0.2s ease',
          pointerEvents: isExpanded ? 'none' : 'auto',
        }}>
          <span style={{ width:8, height:8, borderRadius:'50%', background:'var(--gold)', flexShrink:0, boxShadow:'0 0 6px rgba(224,149,0,0.6)' }} />
          <span style={{ flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', fontSize:13, fontWeight:600, color:'var(--cream)', letterSpacing:'0.01em' }}>
            {activeHeading?.text || 'Privacy Policy'}
          </span>
          <svg width={sz} height={sz} style={{ transform:'rotate(-90deg)', flexShrink:0 }}>
            <circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke="rgba(253,246,236,0.15)" strokeWidth={sw} />
            <circle cx={sz/2} cy={sz/2} r={r} fill="none" stroke="var(--gold)" strokeWidth={sw}
              strokeDasharray={circ} strokeDashoffset={dashOffset} strokeLinecap="round"
              style={{ transition:'stroke-dashoffset 0.2s ease' }} />
          </svg>
        </div>

        {/* ── Expanded menu ── */}
        <div style={{
          position:'absolute', inset:0, display:'flex', flexDirection:'column',
          opacity: isExpanded ? 1 : 0,
          transform: isExpanded ? 'scale(1)' : 'scale(1.04)',
          transition:`opacity 0.25s ease ${isExpanded ? '0.15s' : '0s'}, transform 0.25s ease`,
          pointerEvents: isExpanded ? 'auto' : 'none',
        }}>
          {/* Header */}
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'20px 20px 10px', flexShrink:0 }}>
            <span className="label" style={{ color:'var(--cream-mute)', fontSize:9, letterSpacing:'0.22em' }}>Table of Contents</span>
            <button onClick={e => { e.stopPropagation(); setIsExpanded(false); }}
              style={{ color:'rgba(253,246,236,0.4)', padding:4, lineHeight:0, transition:'color 160ms' }}
              onMouseEnter={e => e.currentTarget.style.color='var(--cream)'}
              onMouseLeave={e => e.currentTarget.style.color='rgba(253,246,236,0.4)'}>
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M3 3l10 10M13 3L3 13" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/>
              </svg>
            </button>
          </div>

          {/* Progress bar */}
          <div style={{ height:2, margin:'0 20px 14px', borderRadius:1, background:'rgba(253,246,236,0.08)', flexShrink:0 }}>
            <div style={{ height:'100%', borderRadius:1, background:'var(--gold)', width:`${progress}%`, transition:'width 0.2s ease' }} />
          </div>

          {/* List */}
          <div className="toc-scroll" style={{ flex:1, overflowY:'auto', padding:'0 10px 14px' }}>
            <div style={{ display:'flex', flexDirection:'column', gap:1 }}>
              {headings.map(h => {
                const isActive  = activeId === h.id;
                const isHovered = hoveredId === h.id;
                const indent    = Math.max(0, h.level - minLevel) * 14 + 10;
                return (
                  <button key={h.id}
                    onMouseEnter={() => setHoveredId(h.id)}
                    onMouseLeave={() => setHoveredId(null)}
                    onClick={e => {
                      e.stopPropagation();
                      window.scrollTo({ top: h.element.getBoundingClientRect().top + window.scrollY - 88, behavior:'smooth' });
                      setIsExpanded(false);
                    }}
                    style={{
                      paddingLeft: indent, paddingRight:10, paddingTop:8, paddingBottom:8,
                      display:'flex', alignItems:'center', gap:8, width:'100%',
                      textAlign:'left', border:'none', borderRadius:8,
                      fontSize: h.level === 2 ? 13 : 12,
                      fontWeight: isActive ? 600 : h.level === 2 ? 500 : 400,
                      background: isActive ? 'rgba(224,149,0,0.1)' : isHovered ? 'rgba(253,246,236,0.05)' : 'transparent',
                      color: isActive ? 'var(--gold)' : isHovered ? 'var(--cream-soft)' : 'rgba(253,246,236,0.4)',
                      transition:'background 180ms, color 180ms',
                      letterSpacing: h.level === 2 ? '0.01em' : '0',
                    }}>
                    <span style={{ flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                      {h.text}
                    </span>
                    {isActive && <span style={{ width:5, height:5, borderRadius:'50%', background:'var(--gold)', flexShrink:0 }} />}
                  </button>
                );
              })}
            </div>
          </div>
        </div>
      </div>
    </>
  );
}

function App() {
  const [lang, setLang] = React.useState(localStorage.getItem('its_lang') || 'en');
  const setLangSave = l => { setLang(l); localStorage.setItem('its_lang', l); document.getElementById('html-root').lang = l; };
  React.useEffect(() => { document.getElementById('html-root').lang = lang; }, [lang]);
  return (
    <LangContext.Provider value={{ lang, setLang: setLangSave }}>
      <PrivacyPage />
    </LangContext.Provider>
  );
}

<style>

@media(hover:none){#cursor-glow{display:none}}
</style>
<script>
(function(){
  var el=document.getElementById('cursor-glow');
  var mx=0,my=0,cx=0,cy=0,on=false;
  document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY;if(!on){on=true;el.style.opacity='1';}});
  document.addEventListener('mouseleave',function(){el.style.opacity='0';on=false;});
  (function loop(){cx+=(mx-cx)*0.07;cy+=(my-cy)*0.07;el.style.transform='translate(calc('+cx.toFixed(1)+'px - 50%),calc('+cy.toFixed(1)+'px - 50%))';requestAnimationFrame(loop);})();
})();
</script>
